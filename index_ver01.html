<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>My Golf Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --gd: #0f1f0f;
    --g1: #162816;
    --g2: #1e3a1e;
    --g3: #2d4f2d;
    --g4: #3d6b3d;
    --gv: #4caf50;
    --gvl:#6fcf72;
    --w:  #eef4ee;
    --gr: #7a957a;
    --acc:#e8c84a;
    --red:#e05252;
    --blue:#4a9fd4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--gd);color:var(--w);display:flex;flex-direction:column;}

  /* ===== HEADER ===== */
  header{
    height:52px;flex-shrink:0;
    background:linear-gradient(135deg,#0a160a,var(--g1));
    border-bottom:2px solid var(--gv);
    display:flex;align-items:center;gap:12px;padding:0 14px;
    position:relative;z-index:20;
  }
  .logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--acc);flex-shrink:0;line-height:1;}
  .logo small{display:block;font-size:10px;letter-spacing:2px;color:var(--gv);margin-top:-3px;}

  /* Course selector */
  .selects{display:flex;gap:8px;flex:1;overflow:hidden;}
  .sel-wrap{position:relative;flex:1;min-width:0;}
  .sel-wrap select{
    width:100%;appearance:none;background:rgba(255,255,255,0.07);
    border:1px solid var(--g4);border-radius:6px;color:var(--w);
    padding:6px 28px 6px 10px;font-size:13px;font-family:inherit;outline:none;
    cursor:pointer;transition:border-color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .sel-wrap select:focus{border-color:var(--gv);}
  .sel-wrap::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--gr);font-size:11px;pointer-events:none;}
  .sel-wrap option{background:#1e3a1e;}

  /* GPS button */
  .gps-btn{
    flex-shrink:0;padding:6px 12px;border-radius:6px;
    background:rgba(74,159,212,0.15);border:1px solid var(--blue);
    color:var(--blue);font-size:12px;cursor:pointer;transition:all .2s;
    font-family:inherit;white-space:nowrap;
  }
  .gps-btn:hover{background:rgba(74,159,212,0.3);}
  .gps-btn.active{background:var(--blue);color:#fff;}

  /* ShotNavi link */
  .sn-btn{
    flex-shrink:0;padding:6px 12px;border-radius:6px;
    background:rgba(255,255,255,0.05);border:1px solid var(--g4);
    color:var(--gr);font-size:12px;cursor:pointer;transition:all .2s;
    font-family:inherit;white-space:nowrap;text-decoration:none;
    display:flex;align-items:center;gap:4px;
  }
  .sn-btn:hover{background:rgba(255,255,255,0.1);color:var(--w);}

  /* ===== HOLE STRIP ===== */
  #holeStrip{
    height:60px;flex-shrink:0;background:var(--g1);
    border-bottom:1px solid var(--g3);
    display:flex;align-items:center;gap:6px;padding:0 12px;
    overflow-x:auto;overflow-y:hidden;
  }
  #holeStrip::-webkit-scrollbar{height:3px;}
  #holeStrip::-webkit-scrollbar-thumb{background:var(--g4);border-radius:2px;}
  .h-btn{
    flex-shrink:0;min-width:48px;padding:4px 6px;
    border-radius:6px;background:var(--g3);border:2px solid transparent;
    color:var(--w);font-size:12px;font-weight:700;cursor:pointer;
    text-align:center;transition:all .15s;font-family:inherit;
  }
  .h-btn:hover{border-color:var(--g4);}
  .h-btn.active{border-color:var(--acc);color:var(--acc);background:var(--g2);}
  .h-btn .par{display:block;font-size:10px;font-weight:400;color:var(--gr);margin-top:1px;}
  .h-btn.active .par{color:var(--acc);opacity:.7;}

  /* ===== MAP ===== */
  #map{flex:1;width:100%;}

  /* ===== DISTANCE PANEL ===== */
  #distPanel{
    position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
    background:rgba(15,31,15,0.92);border:1px solid var(--gv);
    border-radius:12px;padding:14px 22px;text-align:center;
    backdrop-filter:blur(8px);min-width:200px;z-index:10;
    display:none;pointer-events:none;
  }
  #distPanel.show{display:block;}
  #distPanel .label{font-size:11px;letter-spacing:2px;color:var(--gr);text-transform:uppercase;margin-bottom:4px;}
  #distPanel .yards{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--acc);line-height:1;}
  #distPanel .yards span{font-size:20px;color:var(--gr);margin-left:4px;}
  #distPanel .meters{font-size:12px;color:var(--gr);margin-top:2px;}
  #distPanel .target{font-size:12px;color:var(--gv);margin-top:4px;}

  /* ===== BOTTOM BAR ===== */
  #bottomBar{
    height:52px;flex-shrink:0;background:var(--g1);
    border-top:1px solid var(--g3);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;gap:10px;z-index:10;
  }
  .mode-info{font-size:12px;color:var(--gr);flex:1;}
  .mode-info strong{color:var(--gv);}
  .clear-btn{
    padding:7px 16px;border-radius:6px;background:var(--g3);
    border:1px solid var(--g4);color:var(--w);font-size:12px;
    cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .clear-btn:hover{background:var(--g4);}

  /* ===== MODE INDICATOR (top-left on map) ===== */
  #modeTag{
    position:absolute;top:70px;left:10px;z-index:10;
    background:rgba(15,31,15,0.88);border:1px solid var(--gv);
    border-radius:6px;padding:5px 10px;font-size:11px;letter-spacing:1px;
    color:var(--gv);pointer-events:none;backdrop-filter:blur(4px);
  }

  /* ===== EMPTY STATE ===== */
  #emptyMap{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;color:var(--gr);
  }
  #emptyMap .ico{font-size:48px;}
  #emptyMap p{font-size:14px;}

  /* Map wrapper */
  #mapWrap{flex:1;position:relative;display:flex;flex-direction:column;}

  @media(max-width:560px){
    .sn-btn .sn-label{display:none;}
    .logo small{display:none;}
    .gps-btn .gps-label{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">⛳ GOLF<small>DISTANCE</small></div>
  <div class="selects">
    <div class="sel-wrap">
      <select id="gcSel" onchange="onGCSel()">
        <option value="">-- ゴルフ場を選択 --</option>
      </select>
    </div>
    <div class="sel-wrap">
      <select id="courseSel" onchange="onCourseSel()">
        <option value="">-- コース --</option>
      </select>
    </div>
  </div>
  <button class="gps-btn" id="gpsBtn" onclick="toggleGPS()">📍 <span class="gps-label">現在地</span></button>
  <a class="sn-btn" id="snLink" href="#" target="_blank">🗺 <span class="sn-label">ShotNavi</span></a>
</header>

<div id="holeStrip"></div>

<div id="mapWrap">
  <div id="emptyMap">
    <div class="ico">⛳</div>
    <p>ゴルフ場とコースを選択してください</p>
  </div>
  <div id="map" style="display:none;"></div>
  <div id="modeTag">📍 タップ → 距離測定</div>
  <div id="distPanel">
    <div class="label">distance</div>
    <div class="yards" id="yardVal">—<span>yd</span></div>
    <div class="meters" id="meterVal">— m</div>
    <div class="target" id="targetLabel"></div>
  </div>
</div>

<div id="bottomBar">
  <div class="mode-info" id="modeInfo"><strong>コースを選択</strong>してください</div>
  <button class="clear-btn" onclick="clearMeasure()">リセット</button>
</div>

<script>
// ============================================================
// ★★ コースデータ ★★
// Google Mapsで各グリーン中央を右クリック → 緯度経度をここに貼る
// ============================================================
const COURSES = [
  {
    name: 'ローズゴルフクラブ',
    pref: '滋賀県',
    gcid: 970,
    lat: 34.8924,   // コース中心（地図初期表示用）
    lng: 136.0501,
    courses: [
      {
        name: 'アウト', cid: 1312,
        holes: [
          // 各ホールのグリーン中央の緯度経度を登録
          // { no:1, par:4, front:{lat:XX,lng:XX}, back:{lat:XX,lng:XX} }
          // ↓ サンプル（実際の座標に要修正）
          { no:1, par:4, front:{lat:34.8930, lng:136.0495}, back:{lat:34.8928, lng:136.0493} },
          { no:2, par:3, front:{lat:34.8920, lng:136.0488}, back:{lat:34.8918, lng:136.0486} },
          { no:3, par:5, front:{lat:34.8912, lng:136.0480}, back:{lat:34.8910, lng:136.0478} },
          { no:4, par:4, front:{lat:34.8905, lng:136.0472}, back:{lat:34.8903, lng:136.0470} },
          { no:5, par:4, front:{lat:34.8898, lng:136.0465}, back:{lat:34.8896, lng:136.0463} },
          { no:6, par:3, front:{lat:34.8890, lng:136.0458}, back:{lat:34.8888, lng:136.0456} },
          { no:7, par:5, front:{lat:34.8882, lng:136.0450}, back:{lat:34.8880, lng:136.0448} },
          { no:8, par:4, front:{lat:34.8875, lng:136.0442}, back:{lat:34.8873, lng:136.0440} },
          { no:9, par:4, front:{lat:34.8868, lng:136.0435}, back:{lat:34.8866, lng:136.0433} },
        ]
      },
      {
        name: 'イン', cid: 1313,
        holes: [
          { no:1, par:4, front:{lat:34.8960, lng:136.0510}, back:{lat:34.8958, lng:136.0508} },
          { no:2, par:5, front:{lat:34.8953, lng:136.0518}, back:{lat:34.8951, lng:136.0516} },
          { no:3, par:3, front:{lat:34.8945, lng:136.0525}, back:{lat:34.8943, lng:136.0523} },
          { no:4, par:4, front:{lat:34.8938, lng:136.0532}, back:{lat:34.8936, lng:136.0530} },
          { no:5, par:4, front:{lat:34.8930, lng:136.0540}, back:{lat:34.8928, lng:136.0538} },
          { no:6, par:5, front:{lat:34.8922, lng:136.0547}, back:{lat:34.8920, lng:136.0545} },
          { no:7, par:3, front:{lat:34.8915, lng:136.0554}, back:{lat:34.8913, lng:136.0552} },
          { no:8, par:4, front:{lat:34.8907, lng:136.0561}, back:{lat:34.8905, lng:136.0559} },
          { no:9, par:4, front:{lat:34.8900, lng:136.0568}, back:{lat:34.8898, lng:136.0566} },
        ]
      }
    ]
  },
  // ↓ ゴルフ場を追加する場合はここに書く
  // {
  //   name: 'ゴルフ場名',
  //   pref: '○○県',
  //   gcid: XXXX,
  //   lat: XX.XXXX,  // コース中心の緯度
  //   lng: XXX.XXXX, // コース中心の経度
  //   courses: [
  //     {
  //       name: 'アウト', cid: XXXX,
  //       holes: [
  //         { no:1, par:4, front:{lat:XX,lng:XX}, back:{lat:XX,lng:XX} },
  //         ...
  //       ]
  //     }
  //   ]
  // },
];

// ============================================================
// 状態
// ============================================================
const API_KEY = 'AIzaSyCWJ1tClOaETblGP4m0ndFbpPt4JyKN1pg';
let map = null;
let state = { gcIdx:null, cIdx:null, holeIdx:0 };
let markers = [];           // ピンマーカー
let clickMarker = null;     // 打点マーカー
let distanceLine = null;
let gpsMarker = null;
let gpsWatch = null;
let gpsActive = false;
let mapsLoaded = false;

const gc = () => state.gcIdx !== null ? COURSES[state.gcIdx] : null;
const course = () => gc() && state.cIdx !== null ? gc().courses[state.cIdx] : null;
const hole = () => course() ? course().holes[state.holeIdx] : null;

// ============================================================
// セレクタ初期化
// ============================================================
function initSelects() {
  const gcSel = document.getElementById('gcSel');
  COURSES.forEach((c, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = `${c.name}（${c.pref}）`;
    gcSel.appendChild(o);
  });
}

function onGCSel() {
  const v = document.getElementById('gcSel').value;
  state.gcIdx = v === '' ? null : parseInt(v);
  state.cIdx  = null;
  state.holeIdx = 0;
  const cSel = document.getElementById('courseSel');
  cSel.innerHTML = '<option value="">-- コース --</option>';
  if (gc()) {
    gc().courses.forEach((c, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = c.name;
      cSel.appendChild(o);
    });
    // 1コースしかなければ自動選択
    if (gc().courses.length === 1) {
      cSel.value = 0;
      onCourseSel();
    }
  }
  updateShotNaviLink();
}

function onCourseSel() {
  const v = document.getElementById('courseSel').value;
  state.cIdx = v === '' ? null : parseInt(v);
  state.holeIdx = 0;
  renderHoleStrip();
  loadMapForCurrentHole();
  updateShotNaviLink();
}

// ============================================================
// ホールストリップ
// ============================================================
function renderHoleStrip() {
  const strip = document.getElementById('holeStrip');
  if (!course()) { strip.innerHTML = ''; return; }
  strip.innerHTML = course().holes.map((h, i) => `
    <button class="h-btn ${i === state.holeIdx ? 'active' : ''}" onclick="selectHole(${i})">
      ${h.no}H<span class="par">PAR ${h.par}</span>
    </button>
  `).join('');
}

function selectHole(i) {
  state.holeIdx = i;
  renderHoleStrip();
  loadMapForCurrentHole();
  updateShotNaviLink();
}

// ============================================================
// Google Maps 初期化 & ホール表示
// ============================================================
function loadMapForCurrentHole() {
  const h = hole();
  if (!h) {
    document.getElementById('map').style.display = 'none';
    document.getElementById('emptyMap').style.display = 'flex';
    document.getElementById('modeTag').style.display = 'none';
    document.getElementById('modeInfo').innerHTML = '<strong>コースを選択</strong>してください';
    return;
  }
  document.getElementById('emptyMap').style.display = 'none';
  document.getElementById('map').style.display = 'block';
  document.getElementById('modeTag').style.display = 'block';

  clearMeasure();

  const center = { lat: h.front.lat, lng: h.front.lng };

  if (!mapsLoaded) return; // Maps APIがまだ読み込まれていない

  if (!map) {
    map = new google.maps.Map(document.getElementById('map'), {
      center,
      zoom: 17,
      mapTypeId: 'satellite',
      tilt: 0,
      disableDefaultUI: true,
      zoomControl: true,
      gestureHandling: 'greedy',
      zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER }
    });
    map.addListener('click', onMapClick);
  } else {
    map.setCenter(center);
    map.setZoom(17);
  }

  placeHoleMarkers(h);
  document.getElementById('modeInfo').innerHTML = `<strong>${gc().name}</strong> ${course().name} ${h.no}H PAR${h.par} ｜ タップで距離測定`;
}

// ============================================================
// ピンマーカー配置
// ============================================================
function placeHoleMarkers(h) {
  markers.forEach(m => m.setMap(null));
  markers = [];

  // フロントピン（赤）
  const front = new google.maps.Marker({
    position: h.front,
    map,
    title: 'フロントピン',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: '#e05252',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 2,
    },
    label: { text: 'F', color: '#fff', fontSize: '11px', fontWeight: 'bold' }
  });

  // バックピン（黄）
  const back = new google.maps.Marker({
    position: h.back,
    map,
    title: 'バックピン',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: '#e8c84a',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 2,
    },
    label: { text: 'B', color: '#333', fontSize: '11px', fontWeight: 'bold' }
  });

  // クリックで距離測定
  [front, back].forEach((mk, idx) => {
    mk.addListener('click', () => {
      if (clickMarker) showDistance(clickMarker.getPosition(), mk.getPosition(), idx === 0 ? 'フロントピン' : 'バックピン');
    });
  });

  markers = [front, back];
}

// ============================================================
// 地図クリック → 打点マーカー
// ============================================================
function onMapClick(e) {
  const pos = e.latLng;

  // 既存の打点マーカーを削除
  if (clickMarker) clickMarker.setMap(null);
  if (distanceLine) distanceLine.setMap(null);

  clickMarker = new google.maps.Marker({
    position: pos,
    map,
    title: '打点',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 8,
      fillColor: '#4a9fd4',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 2,
    },
    label: { text: '●', color: '#fff', fontSize: '8px' }
  });

  // 一番近いピンへの距離を自動表示
  const h = hole();
  if (h) {
    const dFront = haversine(pos.lat(), pos.lng(), h.front.lat, h.front.lng);
    const dBack  = haversine(pos.lat(), pos.lng(), h.back.lat,  h.back.lng);
    if (dFront <= dBack) {
      showDistance(pos, new google.maps.LatLng(h.front.lat, h.front.lng), 'フロントピン');
    } else {
      showDistance(pos, new google.maps.LatLng(h.back.lat,  h.back.lng),  'バックピン');
    }
  }
}

// ============================================================
// 距離表示
// ============================================================
function showDistance(from, to, label) {
  const m = haversine(from.lat(), from.lng(), to.lat(), to.lng());
  const yd = Math.round(m * 1.09361);

  document.getElementById('yardVal').innerHTML = `${yd}<span>yd</span>`;
  document.getElementById('meterVal').textContent = `${Math.round(m)} m`;
  document.getElementById('targetLabel').textContent = `→ ${label}`;
  document.getElementById('distPanel').classList.add('show');

  // ライン描画
  if (distanceLine) distanceLine.setMap(null);
  distanceLine = new google.maps.Polyline({
    path: [from, to],
    map,
    strokeColor: '#e8c84a',
    strokeOpacity: 0.85,
    strokeWeight: 2,
    icons: [{
      icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 3 },
      offset: '100%'
    }]
  });
}

// ============================================================
// Haversine 公式（2点間の距離をメートルで返す）
// ============================================================
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad;
  const dLng = (lng2 - lng1) * rad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================
// リセット
// ============================================================
function clearMeasure() {
  if (clickMarker)   { clickMarker.setMap(null);   clickMarker = null; }
  if (distanceLine)  { distanceLine.setMap(null);  distanceLine = null; }
  document.getElementById('distPanel').classList.remove('show');
}

// ============================================================
// GPS 現在地
// ============================================================
function toggleGPS() {
  if (gpsActive) {
    stopGPS();
  } else {
    startGPS();
  }
}

function startGPS() {
  if (!navigator.geolocation) { alert('このブラウザはGPSに対応していません'); return; }
  gpsActive = true;
  document.getElementById('gpsBtn').classList.add('active');
  gpsWatch = navigator.geolocation.watchPosition(pos => {
    const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    if (!gpsMarker) {
      gpsMarker = new google.maps.Marker({
        position: latlng, map,
        title: '現在地',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 9,
          fillColor: '#4a9fd4',
          fillOpacity: 0.9,
          strokeColor: '#fff',
          strokeWeight: 2.5,
        }
      });
    } else {
      gpsMarker.setPosition(latlng);
    }
    if (map) map.panTo(latlng);
  }, err => {
    alert('現在地を取得できませんでした: ' + err.message);
    stopGPS();
  }, { enableHighAccuracy: true, maximumAge: 3000 });
}

function stopGPS() {
  gpsActive = false;
  document.getElementById('gpsBtn').classList.remove('active');
  if (gpsWatch) { navigator.geolocation.clearWatch(gpsWatch); gpsWatch = null; }
  if (gpsMarker) { gpsMarker.setMap(null); gpsMarker = null; }
}

// ============================================================
// ShotNaviリンク更新
// ============================================================
function updateShotNaviLink() {
  const link = document.getElementById('snLink');
  const h = hole();
  const g = gc();
  const c = course();
  if (h && g && c) {
    link.href = `https://shotnavi.jp/gcguide/cdata/hdata2_${g.gcid}_${c.cid}_${h.no}.htm`;
  } else {
    link.href = '#';
  }
}

// ============================================================
// Google Maps API 読み込み
// ============================================================
window.initMap = function() {
  mapsLoaded = true;
  // セレクタが選択済みなら地図を表示
  loadMapForCurrentHole();
};

initSelects();
