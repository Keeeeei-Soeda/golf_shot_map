<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golf Course Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0f1f0f;--g1:#162816;--g2:#1e3a1e;--g3:#2d4f2d;--g4:#3d6b3d;
  --gv:#4caf50;--gvd:#388e3c;--w:#eef4ee;--gr:#7a957a;
  --acc:#e8c84a;--red:#e05252;--blue:#4a9fd4;--pur:#a78bfa;--org:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gd);color:var(--w);display:flex;flex-direction:column;}
header{height:52px;flex-shrink:0;background:linear-gradient(135deg,#0a160a,var(--g1));
  border-bottom:2px solid var(--org);display:flex;align-items:center;gap:12px;padding:0 14px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--org);flex-shrink:0;}
.logo small{font-size:10px;color:var(--gr);letter-spacing:1px;margin-left:6px;font-family:'Noto Sans JP',sans-serif;}
.hdr-prog{font-size:12px;color:var(--gv);font-weight:700;margin-left:auto;}
.body-wrap{flex:1;display:flex;overflow:hidden;}
#leftPanel{width:300px;flex-shrink:0;background:var(--g1);border-right:1px solid var(--g3);display:flex;flex-direction:column;overflow:hidden;}
.gc-info{padding:10px 12px;border-bottom:1px solid var(--g3);flex-shrink:0;}
.gc-info label{font-size:10px;color:var(--gr);letter-spacing:1px;display:block;margin-bottom:3px;}
.gc-info input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--g4);border-radius:6px;color:var(--w);padding:6px 9px;font-size:12px;font-family:inherit;outline:none;margin-bottom:7px;}
.gc-info input:focus{border-color:var(--org);}
.gc-info input::placeholder{color:var(--gr);}
.gc-row{display:flex;gap:8px;}
.gc-row .gc-info-field{flex:1;}
#holeTabWrap{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:8px;background:var(--g2);border-bottom:1px solid var(--g3);flex-shrink:0;}
.hole-tab{padding:5px 2px;border-radius:5px;border:1px solid var(--g4);background:var(--g3);color:var(--w);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;position:relative;text-align:center;}
.hole-tab.out{border-top:2px solid var(--blue);}
.hole-tab.in{border-top:2px solid var(--pur);}
.hole-tab.active{background:var(--org);border-color:var(--org);border-top-color:var(--org);color:#000;}
.done-dot{position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--gv);border:1px solid var(--gd);display:none;}
.hole-tab.done .done-dot{display:block;}
#pointArea{flex:1;overflow-y:auto;padding:10px 12px;}
.par-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:var(--g2);border-radius:8px;padding:8px 12px;}
.par-row label{font-size:12px;color:var(--gr);flex:1;}
.par-btns{display:flex;gap:4px;}
.par-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--g4);background:var(--g3);color:var(--w);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.par-btn.active{background:var(--gv);border-color:var(--gv);color:#fff;}
.point-title{font-size:10px;color:var(--gr);letter-spacing:1px;margin-bottom:7px;}
.point-btn-wrap{display:flex;flex-direction:column;gap:5px;}
.point-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:2px solid var(--g4);background:var(--g3);cursor:pointer;transition:all .15s;}
.point-btn.active{border-color:var(--org);background:rgba(245,158,11,.1);}
.point-btn.set{border-color:var(--gv);background:rgba(76,175,80,.08);}
.point-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #fff;}
.point-label{flex:1;}
.point-label .name{font-size:12px;font-weight:700;}
.point-label .coords{font-size:9px;color:var(--gr);margin-top:1px;font-family:monospace;}
.point-label .coords.set{color:var(--gv);}
.point-check{color:var(--gv);font-size:14px;flex-shrink:0;opacity:0;}
.point-btn.set .point-check{opacity:1;}
.point-btn.active .point-label .name{color:var(--org);}
.nav-row{display:flex;gap:6px;margin-top:10px;}
.nav-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--g4);background:var(--g3);color:var(--w);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.nav-btn.next{background:var(--org);border-color:var(--org);color:#000;}
#outputArea{padding:10px 12px;border-top:1px solid var(--g3);flex-shrink:0;}
.output-title{font-size:10px;color:var(--gr);letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.output-title .progress{color:var(--gv);font-weight:700;}
#outputBox{background:var(--gd);border:1px solid var(--g4);border-radius:6px;padding:7px 9px;font-size:9px;font-family:monospace;color:var(--gv);height:70px;overflow-y:auto;line-height:1.6;margin-bottom:7px;white-space:pre;}
.copy-btn{width:100%;padding:9px;border-radius:8px;background:var(--gv);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.copy-btn:disabled{background:var(--g3);color:var(--gr);cursor:default;}
.copy-btn.copied{background:var(--blue);}
#map{width:100%;height:100%;}
#indicator{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,.95);border-radius:20px;padding:7px 18px;font-size:13px;font-weight:700;color:#000;pointer-events:none;z-index:5;display:none;white-space:nowrap;}
#mapWrap{flex:1;position:relative;}
#searchBox{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;background:rgba(10,22,10,.95);border:1px solid var(--org);border-radius:24px;padding:4px 6px 4px 14px;box-shadow:0 2px 12px rgba(0,0,0,.5);width:min(360px, 90vw);}
#searchInput{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:14px;font-family:inherit;padding:6px 0;}
#searchInput::placeholder{color:var(--gr);}
#searchClear{background:none;border:none;color:var(--gr);font-size:14px;cursor:pointer;padding:4px 8px;line-height:1;}
</style>
</head>
<body>
<header>
  <div class="logo">⛳ PICKER<small>座標登録ツール（18H）</small></div>
  <div class="hdr-prog" id="headerProg">0 / 18 ホール</div>
</header>
<div class="body-wrap">
  <div id="leftPanel">
    <div class="gc-info">
      <div class="gc-row">
        <div class="gc-info-field">
          <label>ゴルフ場名</label>
          <input type="text" id="gcName" placeholder="亀岡ゴルフクラブ" oninput="updateOutput()"/>
        </div>
        <div class="gc-info-field">
          <label>都道府県</label>
          <input type="text" id="gcPref" placeholder="京都" oninput="updateOutput()"/>
        </div>
      </div>
      <div class="gc-row">
        <div class="gc-info-field">
          <label>アウト コース名</label>
          <input type="text" id="outName" placeholder="アウト" oninput="updateOutput()"/>
        </div>
        <div class="gc-info-field">
          <label>イン コース名</label>
          <input type="text" id="inName" placeholder="イン" oninput="updateOutput()"/>
        </div>
      </div>
    </div>
    <div id="holeTabWrap"></div>
    <div id="pointArea">
      <div class="par-row">
        <label>PAR</label>
        <div class="par-btns">
          <button class="par-btn" onclick="setPar(3)">3</button>
          <button class="par-btn active" onclick="setPar(4)">4</button>
          <button class="par-btn" onclick="setPar(5)">5</button>
        </div>
      </div>
      <div class="point-title">📍 登録する地点を選んで地図をクリック</div>
      <div class="point-btn-wrap" id="pointBtns"></div>
      <div class="nav-row">
        <button class="nav-btn" onclick="prevHole()">◀ 前</button>
        <button class="nav-btn next" onclick="nextHole()">次 ▶</button>
      </div>
    </div>
    <div id="outputArea">
      <div class="output-title">
        <span>courses.js 出力（アウト＋イン）</span>
        <span class="progress" id="progressLabel">0/18H</span>
      </div>
      <div id="outputBox">← 地図をクリックして座標を入力してください</div>
      <button class="copy-btn" id="copyBtn" onclick="copyOutput()" disabled>📋 courses.js 形式でコピー</button>
    </div>
  </div>
  <div id="mapWrap">
    <div id="map"></div>
    <div id="indicator"></div>
    <div id="searchBox">
      <input id="searchInput" type="text" placeholder="🔍 ゴルフ場名で検索..." autocomplete="off"/>
      <button id="searchClear" onclick="clearSearch()" title="クリア">✕</button>
    </div>
  </div>
</div>
<script>
const POINT_DEFS = [
  { key:'tee',    label:'ティー',       color:'#4a9fd4', letter:'T' },
  { key:'front',  label:'フロント (F)', color:'#e05252', letter:'F' },
  { key:'center', label:'センター (C)', color:'#a78bfa', letter:'C' },
  { key:'back',   label:'バック (B)',   color:'#e8c84a', letter:'B' },
];

const holeData = Array.from({ length: 18 }, (_, i) => ({
  no: i + 1, par: 4,
  tee: null, front: null, center: null, back: null,
}));

let currentHole = 0, currentPoint = 'tee', map = null, placedMarkers = {};

function init() { renderHoleTabs(); renderPointBtns(); updateOutput(); }

function renderHoleTabs() {
  document.getElementById('holeTabWrap').innerHTML = holeData.map((h, i) => {
    const done = isDone(i), cls = i < 9 ? 'out' : 'in';
    return `<button class="hole-tab ${cls} ${i===currentHole?'active':''} ${done?'done':''}" onclick="selectHole(${i})">${h.no}H<div class="done-dot"></div></button>`;
  }).join('');
}

function isDone(i) { const h=holeData[i]; return !!(h.tee&&h.front&&h.center&&h.back); }

function selectHole(i) {
  currentHole=i; currentPoint='tee';
  renderHoleTabs(); renderPointBtns(); updateParBtns(); updateIndicator();
  const h=holeData[i]; if(map&&h.tee) map.panTo({lat:h.tee.lat,lng:h.tee.lng});
}

function prevHole() { if(currentHole>0)  selectHole(currentHole-1); }
function nextHole() { if(currentHole<17) selectHole(currentHole+1); }

function renderPointBtns() {
  const h = holeData[currentHole];
  document.getElementById('pointBtns').innerHTML = POINT_DEFS.map(p => {
    const val=h[p.key], isActive=currentPoint===p.key, isSet=!!val;
    const coords = val ? `${val.lat.toFixed(6)}, ${val.lng.toFixed(6)}` : '未登録';
    return `<div class="point-btn ${isActive?'active':''} ${isSet?'set':''}" onclick="selectPoint('${p.key}')">
      <div class="point-dot" style="background:${p.color}"></div>
      <div class="point-label"><div class="name">${p.label}</div><div class="coords ${isSet?'set':''}">${coords}</div></div>
      <div class="point-check">✓</div></div>`;
  }).join('');
}

function selectPoint(key) { currentPoint=key; renderPointBtns(); updateIndicator(); }

function setPar(p) { holeData[currentHole].par=p; updateParBtns(); updateOutput(); }

function updateParBtns() {
  const par=holeData[currentHole].par;
  document.querySelectorAll('.par-btn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===par));
}

function updateIndicator() {
  const h=holeData[currentHole], pd=POINT_DEFS.find(p=>p.key===currentPoint);
  const sec=currentHole<9?'アウト':'イン';
  const el=document.getElementById('indicator');
  el.textContent=`${sec} H${h.no} — ${pd.label} をクリックして登録`;
  el.style.display='block';
}

window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center:{lat:34.8924,lng:136.0501}, zoom:15, mapTypeId:'satellite', tilt:0,
    disableDefaultUI:true, zoomControl:true, gestureHandling:'greedy',
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_CENTER},
  });
  map.addListener('click', onMapClick);
  updateIndicator();

  const input = document.getElementById('searchInput');
  const ac = new google.maps.places.Autocomplete(input, {
    types:['establishment'], componentRestrictions:{country:'jp'}, fields:['geometry','name'],
  });
  ac.addListener('place_changed', () => {
    const place = ac.getPlace();
    if (!place.geometry || !place.geometry.location) return;
    map.setCenter(place.geometry.location); map.setZoom(15);
    const el = document.getElementById('gcName');
    if (!el.value) { el.value = place.name; updateOutput(); }
    document.getElementById('searchClear').style.display = 'inline';
  });
};

function clearSearch() {
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
}

function onMapClick(e) {
  const lat=e.latLng.lat(), lng=e.latLng.lng(), h=holeData[currentHole];
  h[currentPoint]={lat:parseFloat(lat.toFixed(6)),lng:parseFloat(lng.toFixed(6))};
  placeMarker(currentHole, currentPoint, e.latLng);
  const keys=POINT_DEFS.map(p=>p.key), idx=keys.indexOf(currentPoint);
  if (idx < keys.length-1) currentPoint = keys[idx+1];
  renderPointBtns(); renderHoleTabs(); updateIndicator(); updateOutput();
}

function placeMarker(hIdx, key, latlng) {
  const mk=`${hIdx}_${key}`;
  if (placedMarkers[mk]) placedMarkers[mk].setMap(null);
  const pd=POINT_DEFS.find(p=>p.key===key), h=holeData[hIdx];
  placedMarkers[mk] = new google.maps.Marker({
    position:latlng, map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:pd.color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
    label:{text:pd.letter,color:'#fff',fontSize:'10px',fontWeight:'bold'},
    title:`H${h.no} ${pd.label}`, zIndex:50,
  });
  placedMarkers[mk].addListener('click', ()=>{
    currentHole=hIdx; currentPoint=key;
    renderHoleTabs(); renderPointBtns(); updateParBtns(); updateIndicator();
  });
}

function fmtCoord(val) {
  if (!val) return 'null';
  return `{ lat: ${val.lat}, lng: ${val.lng} }`;
}

function makeBlock(courseName, holes, gcName, gcPref) {
  const tees = holes.filter(h=>h.tee).map(h=>h.tee);
  const lat  = tees.length ? (tees.reduce((a,t)=>a+t.lat,0)/tees.length).toFixed(4) : 'XX.XXXX';
  const lng  = tees.length ? (tees.reduce((a,t)=>a+t.lng,0)/tees.length).toFixed(4) : 'XXX.XXXX';
  const holesStr = holes.map(h => {
    if (!h.tee&&!h.front&&!h.center&&!h.back)
      return `          { no:${h.no}, par:${h.par}, tee:null, front:null, center:null, back:null },`;
    return `          {
            no:${h.no}, par:${h.par},
            tee:    ${fmtCoord(h.tee)},
            front:  ${fmtCoord(h.front)},
            center: ${fmtCoord(h.center)},
            back:   ${fmtCoord(h.back)},
          },`;
  }).join('\n');
  return `  {
    name: '${gcName}',
    pref: '${gcPref}',
    gcid: 0,
    lat:  ${lat},
    lng:  ${lng},
    courses: [
      {
        name: '${courseName}',
        cid:  XXXX,
        holes: [
${holesStr}
        ],
      },
    ],
  },`;
}

function updateOutput() {
  const gcName  = document.getElementById('gcName').value  || 'ゴルフ場名';
  const gcPref  = document.getElementById('gcPref').value  || '○○県';
  const outName = document.getElementById('outName').value || 'アウト';
  const inName  = document.getElementById('inName').value  || 'イン';
  const outBlock = makeBlock(outName, holeData.slice(0,9),  gcName, gcPref);
  const inBlock  = makeBlock(inName,  holeData.slice(9,18), gcName, gcPref);
  document.getElementById('outputBox').textContent = outBlock + '\n\n' + inBlock;
  const done = holeData.filter((_,i)=>isDone(i)).length;
  document.getElementById('progressLabel').textContent = `${done}/18H`;
  document.getElementById('headerProg').textContent    = `${done} / 18 ホール`;
  document.getElementById('copyBtn').disabled = done===0;
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('outputBox').textContent).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='✅ コピーしました！courses.js に貼り付けてください';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='📋 courses.js 形式でコピー'; btn.classList.remove('copied'); }, 3000);
  });
}

init();
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBryPip32SP4e5y2RBSDyKLbxoz313JAgU&callback=initMap&loading=async&libraries=places&language=ja"></script>
</body>
</html>
