<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>My Golf Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0f1f0f; --g1:#162816; --g2:#1e3a1e; --g3:#2d4f2d; --g4:#3d6b3d;
  --gv:#4caf50; --gvd:#388e3c; --w:#eef4ee; --gr:#7a957a;
  --acc:#e8c84a; --red:#e05252; --blue:#4a9fd4; --pur:#a78bfa;
  --orange:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gd);color:var(--w);display:flex;flex-direction:column;}

/* ===== HEADER ===== */
header{
  height:52px;flex-shrink:0;
  background:linear-gradient(135deg,#0a160a,var(--g1));
  border-bottom:2px solid var(--gv);
  display:flex;align-items:center;gap:8px;padding:0 10px;z-index:20;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;color:var(--acc);flex-shrink:0;line-height:1;}
.logo small{display:block;font-size:9px;letter-spacing:2px;color:var(--gv);margin-top:-2px;}
.hdr-sel{position:relative;flex:1;min-width:0;}
.hdr-sel select{
  width:100%;appearance:none;background:rgba(255,255,255,0.07);
  border:1px solid var(--g4);border-radius:6px;color:var(--w);
  padding:5px 24px 5px 8px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;
}
.hdr-sel::after{content:'▾';position:absolute;right:7px;top:50%;transform:translateY(-50%);color:var(--gr);font-size:10px;pointer-events:none;}
.hdr-sel select option{background:#1e3a1e;}
.hdr-btn{
  flex-shrink:0;padding:5px 9px;border-radius:6px;border:1px solid var(--g4);
  background:rgba(255,255,255,0.05);color:var(--gr);font-size:12px;
  cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:flex;align-items:center;gap:3px;
}
.hdr-btn:hover{color:var(--w);background:rgba(255,255,255,0.1);}
.hdr-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
#histBtn{position:relative;}
.hist-badge{
  position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;border-radius:8px;padding:1px 4px;display:none;
}

/* ===== HOLE STRIP ===== */
#holeStrip{
  height:56px;flex-shrink:0;background:var(--g1);
  border-bottom:1px solid var(--g3);
  display:flex;align-items:center;gap:5px;padding:0 8px;overflow-x:auto;overflow-y:hidden;
}
#holeStrip::-webkit-scrollbar{height:3px;}
#holeStrip::-webkit-scrollbar-thumb{background:var(--g4);}
.h-btn{
  flex-shrink:0;min-width:44px;padding:3px 5px;
  border-radius:6px;background:var(--g3);border:2px solid transparent;
  color:var(--w);font-size:11px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;font-family:inherit;position:relative;
}
.h-btn:hover{border-color:var(--g4);}
.h-btn.active{border-color:var(--acc);color:var(--acc);background:var(--g2);}
.h-btn.no-data{opacity:0.4;}
.h-btn .par{display:block;font-size:9px;font-weight:400;color:var(--gr);margin-top:1px;}
.h-btn.active .par{color:var(--acc);opacity:.7;}
.h-btn .shot-dot{
  position:absolute;top:2px;right:2px;width:6px;height:6px;
  border-radius:50%;background:var(--gv);
}

/* ===== MAP ===== */
#mapWrap{flex:1;position:relative;display:flex;flex-direction:column;}
#map{flex:1;width:100%;display:none;}
#emptyMap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--gr);}
#emptyMap .ico{font-size:46px;}

/* 凡例 */
#legend{
  position:absolute;top:8px;left:8px;z-index:10;
  background:rgba(10,22,10,0.88);border:1px solid var(--g4);
  border-radius:8px;padding:7px 11px;backdrop-filter:blur(4px);display:none;pointer-events:none;
}
.leg-r{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--w);margin-bottom:3px;}
.leg-r:last-child{margin-bottom:0;}
.leg-dot{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.6);flex-shrink:0;}

/* 距離パネル */
#distPanel{
  position:absolute;bottom:58px;left:50%;transform:translateX(-50%);
  background:rgba(10,22,10,0.93);border:1px solid var(--gv);
  border-radius:12px;padding:10px 18px;text-align:center;
  backdrop-filter:blur(8px);min-width:180px;z-index:10;display:none;pointer-events:none;
}
#distPanel.show{display:block;}
#distPanel .dlabel{font-size:9px;letter-spacing:2px;color:var(--gr);text-transform:uppercase;}
#distPanel .yards{font-family:'Bebas Neue',sans-serif;font-size:46px;color:var(--acc);line-height:1.05;}
#distPanel .yards span{font-size:16px;color:var(--gr);margin-left:2px;}
#distPanel .meters{font-size:10px;color:var(--gr);}
#distPanel .tgt{font-size:10px;margin-top:3px;}
.tgt.front{color:var(--red);}
.tgt.center{color:var(--pur);}
.tgt.back{color:var(--acc);}

/* ===== BOTTOM BAR ===== */
#bottomBar{
  height:50px;flex-shrink:0;background:var(--g1);
  border-top:1px solid var(--g3);
  display:flex;align-items:center;gap:8px;padding:0 10px;z-index:10;
}
.mode-tabs{display:flex;gap:4px;flex-shrink:0;}
.mtab{
  padding:6px 11px;border-radius:6px;border:1px solid var(--g3);
  background:rgba(255,255,255,0.04);color:var(--gr);font-size:11px;
  cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;
}
.mtab:hover{background:rgba(255,255,255,0.1);}
.mtab.active{background:var(--gv);border-color:var(--gv);color:#fff;font-weight:700;}
.mtab.rec.active{background:var(--orange);border-color:var(--orange);}
.mode-info{font-size:11px;color:var(--gr);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mode-info strong{color:var(--gv);}
.bb-btn{
  flex-shrink:0;padding:6px 11px;border-radius:6px;
  background:var(--g3);border:1px solid var(--g4);color:var(--w);
  font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.bb-btn:hover{background:var(--g4);}
.bb-btn.danger{border-color:var(--red);color:var(--red);}
.bb-btn.danger:hover{background:rgba(224,82,82,0.15);}

/* ===== SHOT PANEL ===== */
#shotPanel{
  position:absolute;bottom:0;left:0;right:0;z-index:30;
  background:var(--g1);border-top:2px solid var(--orange);
  border-radius:16px 16px 0 0;padding:14px 14px 20px;
  transform:translateY(100%);transition:transform .3s ease;
}
#shotPanel.open{transform:translateY(0);}
.sp-title{font-size:13px;font-weight:700;color:var(--orange);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.sp-info{display:flex;gap:10px;margin-bottom:12px;}
.sp-stat{flex:1;background:var(--g2);border-radius:8px;padding:7px 10px;text-align:center;}
.sp-stat .sv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--acc);line-height:1;}
.sp-stat .sv span{font-size:13px;color:var(--gr);}
.sp-stat .sk{font-size:9px;color:var(--gr);margin-top:1px;letter-spacing:1px;}
.club-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.cb{
  padding:6px 9px;border-radius:6px;background:var(--g3);border:1px solid var(--g4);
  color:var(--w);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;min-width:44px;text-align:center;
}
.cb:hover{background:var(--g4);}
.cb.sel{background:var(--orange);border-color:var(--orange);color:#000;}
.sp-btns{display:flex;gap:8px;}
.sp-ok{
  flex:1;padding:10px;border-radius:8px;background:var(--gv);border:none;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.sp-ok:hover{background:var(--gvd);}
.sp-ok:disabled{background:var(--g3);color:var(--gr);cursor:default;}
.sp-cancel{
  padding:10px 14px;border-radius:8px;background:var(--g3);border:1px solid var(--g4);
  color:var(--gr);font-size:13px;cursor:pointer;font-family:inherit;
}

/* ===== HISTORY PANEL ===== */
#histPanel{
  position:absolute;inset:0;z-index:40;background:var(--gd);
  display:none;flex-direction:column;overflow:hidden;
}
#histPanel.open{display:flex;}
.hist-header{
  height:52px;flex-shrink:0;background:var(--g1);border-bottom:2px solid var(--acc);
  display:flex;align-items:center;padding:0 14px;gap:10px;
}
.hist-header h2{font-size:15px;color:var(--acc);flex:1;}
.hist-close{background:none;border:none;color:var(--gr);font-size:20px;cursor:pointer;padding:4px;}
.hist-list{flex:1;overflow-y:auto;padding:12px;}
.hist-round{
  background:var(--g2);border:1px solid var(--g3);border-radius:10px;
  padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;
}
.hist-round:hover{border-color:var(--acc);}
.hr-title{font-size:13px;font-weight:700;color:var(--w);}
.hr-sub{font-size:11px;color:var(--gr);margin-top:3px;}
.hr-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.hr-badge{
  padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;
  background:var(--g3);color:var(--gr);
}
.hr-badge.has{background:rgba(76,175,80,.2);color:var(--gv);}
.hist-empty{text-align:center;color:var(--gr);margin-top:40px;font-size:13px;}

/* ===== HOLE REVIEW ===== */
#reviewPanel{
  position:absolute;bottom:0;left:0;right:0;z-index:35;
  background:var(--g1);border-top:2px solid var(--acc);
  border-radius:16px 16px 0 0;padding:12px 14px 20px;
  max-height:60%;overflow-y:auto;display:none;
}
#reviewPanel.open{display:block;}
.rv-title{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:10px;}
.rv-shot{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:var(--g2);border-radius:8px;margin-bottom:6px;
}
.rv-no{
  width:26px;height:26px;border-radius:50%;background:var(--gv);
  color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.rv-club{font-size:13px;font-weight:700;min-width:36px;}
.rv-dist{flex:1;font-size:11px;color:var(--gr);}
.rv-del{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:2px 6px;}

/* Overlay tap blocker while panel open */
#panelOverlay{position:absolute;inset:0;z-index:25;display:none;}
#panelOverlay.show{display:block;}
</style>
</head>
<body>

<header>
  <div class="logo">⛳ GOLF<small>TRACKER</small></div>
  <div class="hdr-sel">
    <select id="gcSel" onchange="onGCSel()">
      <option value="">-- ゴルフ場 --</option>
    </select>
  </div>
  <div class="hdr-sel">
    <select id="courseSel" onchange="onCourseSel()">
      <option value="">-- コース --</option>
    </select>
  </div>
  <button class="hdr-btn active" id="gpsBtn" onclick="toggleGPS()">📍</button>
  <a class="hdr-btn" id="snLink" href="#" target="_blank">🗺</a>
  <button class="hdr-btn" id="histBtn" onclick="openHistory()">
    📋<span class="hist-badge" id="histBadge"></span>
  </button>
</header>

<div id="holeStrip"></div>

<div id="mapWrap">
  <div id="emptyMap">
    <div class="ico">⛳</div>
    <p>ゴルフ場・コースを選択してください</p>
  </div>
  <div id="map"></div>

  <div id="legend">
    <div class="leg-r"><div class="leg-dot" style="background:var(--blue)"></div>ティー (T)</div>
    <div class="leg-r"><div class="leg-dot" style="background:var(--red)"></div>フロント (F)</div>
    <div class="leg-r"><div class="leg-dot" style="background:var(--pur)"></div>センター (C)</div>
    <div class="leg-r"><div class="leg-dot" style="background:var(--acc)"></div>バック (B)</div>
    <div class="leg-r" id="legShot" style="display:none"><div class="leg-dot" style="background:var(--gv)"></div>ショット</div>
  </div>

  <div id="distPanel">
    <div class="dlabel">distance</div>
    <div class="yards" id="yardVal">—<span>yd</span></div>
    <div class="meters" id="meterVal">— m</div>
    <div class="tgt" id="tgtLabel"></div>
  </div>

  <div id="panelOverlay"></div>

  <!-- Shot registration panel -->
  <div id="shotPanel">
    <div class="sp-title">
      <span id="spTitle">ショットを登録</span>
      <button class="sp-cancel" onclick="cancelShot()" style="padding:2px 8px;font-size:11px;">✕</button>
    </div>
    <div class="sp-info">
      <div class="sp-stat">
        <div class="sv" id="spCarry">—<span>yd</span></div>
        <div class="sk">CARRY</div>
      </div>
      <div class="sp-stat">
        <div class="sv" id="spRemain">—<span>yd</span></div>
        <div class="sk">REMAINING</div>
      </div>
    </div>
    <div class="club-grid" id="clubGrid"></div>
    <div class="sp-btns">
      <button class="sp-cancel" onclick="cancelShot()">キャンセル</button>
      <button class="sp-ok" id="spOkBtn" onclick="confirmShot()" disabled>登録する</button>
    </div>
  </div>

  <!-- Hole review panel -->
  <div id="reviewPanel">
    <div class="rv-title" id="rvTitle">ショット履歴</div>
    <div id="rvList"></div>
    <button class="bb-btn danger" style="width:100%;margin-top:8px;" onclick="clearHoleShots()">このホールのショットを削除</button>
  </div>
</div>

<div id="bottomBar">
  <div class="mode-tabs">
    <button class="mtab active" id="tabMeasure" onclick="setMode('measure')">📏 測定</button>
    <button class="mtab rec" id="tabRecord" onclick="setMode('record')">🏌️ 記録</button>
  </div>
  <div class="mode-info" id="modeInfo">コースを選択してください</div>
  <button class="bb-btn" id="reviewBtn" onclick="toggleReview()" style="display:none">📋 確認</button>
  <button class="bb-btn" onclick="clearMeasure()">↺</button>
</div>

<!-- History panel -->
<div id="histPanel">
  <div class="hist-header">
    <h2>📋 ラウンド履歴</h2>
    <button class="hist-close" onclick="closeHistory()">✕</button>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<script>
// ============================================================
// ★ コースデータ ★
// ============================================================
const COURSES = [
  {
    name:'ローズゴルフクラブ', pref:'滋賀県', gcid:970,
    lat:34.8924, lng:136.0535,
    courses:[
      {
        name:'アウト', cid:1312,
        holes:[
          { no:1, par:5, tee:{lat:34.892567,lng:136.051814}, front:{lat:34.892015,lng:136.056338}, center:{lat:34.892025,lng:136.056534}, back:{lat:34.892010,lng:136.056733} },
          { no:2, par:4, tee:{lat:34.892468,lng:136.057524}, front:{lat:34.893836,lng:136.055347}, center:{lat:34.893976,lng:136.055313}, back:{lat:34.894094,lng:136.055283} },
          { no:3, par:3, tee:{lat:34.894491,lng:136.055709}, front:{lat:34.893656,lng:136.056758}, center:{lat:34.893573,lng:136.056885}, back:{lat:34.893475,lng:136.056991} },
          { no:4, par:4, tee:{lat:34.894440,lng:136.057040}, front:{lat:34.892230,lng:136.059981}, center:{lat:34.892151,lng:136.060141}, back:{lat:34.892084,lng:136.060289} },
          { no:5, par:4, tee:null,front:null,center:null,back:null },
          { no:6, par:4, tee:null,front:null,center:null,back:null },
          { no:7, par:5, tee:null,front:null,center:null,back:null },
          { no:8, par:3, tee:null,front:null,center:null,back:null },
          { no:9, par:4, tee:null,front:null,center:null,back:null },
        ]
      },
      {
        name:'イン', cid:1313,
        holes:[
          { no:1,par:4,tee:null,front:null,center:null,back:null },
          { no:2,par:4,tee:null,front:null,center:null,back:null },
          { no:3,par:4,tee:null,front:null,center:null,back:null },
          { no:4,par:4,tee:null,front:null,center:null,back:null },
          { no:5,par:4,tee:null,front:null,center:null,back:null },
          { no:6,par:4,tee:null,front:null,center:null,back:null },
          { no:7,par:4,tee:null,front:null,center:null,back:null },
          { no:8,par:4,tee:null,front:null,center:null,back:null },
          { no:9,par:4,tee:null,front:null,center:null,back:null },
        ]
      },
    ]
  },
];

const CLUBS = ['1W','3W','5W','4H','5H','3I','4I','5I','6I','7I','8I','9I','PW','AW','SW','PT'];

// ============================================================
// 状態
// ============================================================
let map=null, mapsLoaded=false;
let state={ gcIdx:null, cIdx:null, holeIdx:0 };
let appMode = 'measure'; // 'measure' | 'record'
let pinMarkers=[], measureLine=null, measureClick=null;
let shotMarkers=[], shotLines=[];
let gpsMarker=null, gpsWatch=null, gpsActive=false;

// 現在ラウンドのショットデータ: { [holeKey]: [{no,lat,lng,club,carry,remaining}] }
let roundShots = {};
let roundId = null;

// shot panel state
let pendingPos = null, selectedClub = null;

const gc      = ()=> state.gcIdx!==null ? COURSES[state.gcIdx] : null;
const course  = ()=> gc()&&state.cIdx!==null ? gc().courses[state.cIdx] : null;
const hole    = ()=> course() ? course().holes[state.holeIdx] : null;
const hasData = (h)=> h&&h.tee&&h.front;
const holeKey = ()=> `${state.gcIdx}_${state.cIdx}_${state.holeIdx}`;
const currentShots = ()=> roundShots[holeKey()] || [];

// ============================================================
// セレクタ
// ============================================================
function initSelects(){
  const s=document.getElementById('gcSel');
  COURSES.forEach((c,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=`${c.name}（${c.pref}）`; s.appendChild(o); });
}
function onGCSel(){
  const v=document.getElementById('gcSel').value;
  state.gcIdx=v===''?null:parseInt(v); state.cIdx=null; state.holeIdx=0;
  const cs=document.getElementById('courseSel');
  cs.innerHTML='<option value="">-- コース --</option>';
  if(gc()){ gc().courses.forEach((c,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=c.name; cs.appendChild(o); }); }
  startRound(); updateSNLink();
}
function onCourseSel(){
  const v=document.getElementById('courseSel').value;
  state.cIdx=v===''?null:parseInt(v); state.holeIdx=0;
  renderHoleStrip(); loadHole(); updateSNLink();
}

// ============================================================
// ラウンド管理
// ============================================================
function startRound(){
  if(!gc()) return;
  roundId = `round_${Date.now()}`;
  roundShots = {};
}

function saveRound(){
  if(!gc()||!course()||!roundId) return;
  const rounds = JSON.parse(localStorage.getItem('golfRounds')||'[]');
  const idx = rounds.findIndex(r=>r.id===roundId);
  const data = {
    id: roundId,
    date: new Date().toLocaleDateString('ja-JP'),
    gcName: gc().name,
    courseName: course().name,
    shots: roundShots,
    updatedAt: Date.now()
  };
  if(idx>=0) rounds[idx]=data; else rounds.unshift(data);
  localStorage.setItem('golfRounds', JSON.stringify(rounds.slice(0,30)));
  updateHistBadge();
}

function updateHistBadge(){
  const rounds = JSON.parse(localStorage.getItem('golfRounds')||'[]');
  const badge = document.getElementById('histBadge');
  if(rounds.length>0){ badge.textContent=rounds.length; badge.style.display='block'; }
  else badge.style.display='none';
}

// ============================================================
// ホールストリップ
// ============================================================
function renderHoleStrip(){
  const strip=document.getElementById('holeStrip');
  if(!course()){ strip.innerHTML=''; return; }
  strip.innerHTML=course().holes.map((h,i)=>{
    const shots=roundShots[`${state.gcIdx}_${state.cIdx}_${i}`]||[];
    return `<button class="h-btn ${i===state.holeIdx?'active':''} ${!hasData(h)?'no-data':''}"
      onclick="selectHole(${i})">
      ${h.no}H<span class="par">PAR${h.par}</span>
      ${shots.length?'<div class="shot-dot"></div>':''}
    </button>`;
  }).join('');
}
function selectHole(i){ state.holeIdx=i; renderHoleStrip(); loadHole(); closeReview(); updateSNLink(); }

// ============================================================
// モード切替
// ============================================================
function setMode(m){
  appMode=m;
  document.getElementById('tabMeasure').classList.toggle('active', m==='measure');
  document.getElementById('tabRecord').classList.toggle('active', m==='record');
  clearMeasure();
  updateModeInfo();
}
function updateModeInfo(){
  const h=hole();
  const shots=currentShots();
  if(appMode==='measure')
    document.getElementById('modeInfo').innerHTML=h&&hasData(h)?`<strong>H${h.no} PAR${h.par}</strong> タップで距離測定`:'コースを選択';
  else
    document.getElementById('modeInfo').innerHTML=h&&hasData(h)?
      `<strong>🏌️ 記録モード</strong> ${shots.length?shots.length+'打済':'タップで1打目登録'}` :
      '座標未登録';
}

// ============================================================
// 地図ロード
// ============================================================
function loadHole(){
  const h=hole();
  document.getElementById('reviewBtn').style.display='none';

  if(!h||!hasData(h)){
    document.getElementById('map').style.display='none';
    document.getElementById('emptyMap').style.display='flex';
    document.getElementById('emptyMap').querySelector('p').textContent=
      h?`${h.no}番ホールの座標はまだ登録されていません`:'コースを選択してください';
    document.getElementById('legend').style.display='none';
    clearMeasure(); clearShotLayer();
    updateModeInfo();
    return;
  }

  document.getElementById('emptyMap').style.display='none';
  document.getElementById('map').style.display='block';
  document.getElementById('legend').style.display='block';
  document.getElementById('reviewBtn').style.display='flex';
  clearMeasure();

  if(!mapsLoaded) return;

  if(!map){
    map=new google.maps.Map(document.getElementById('map'),{
      center:{lat:h.tee.lat,lng:h.tee.lng}, zoom:17,
      mapTypeId:'satellite', tilt:0,
      disableDefaultUI:true, zoomControl:true, gestureHandling:'greedy',
      zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_CENTER}
    });
    map.addListener('click', onMapClick);
  } else {
    const bounds=new google.maps.LatLngBounds();
    [h.tee,h.front,h.back].forEach(p=>bounds.extend(p));
    map.fitBounds(bounds,{top:60,bottom:60,left:40,right:40});
  }

  placePins(h);
  renderShotLayer();
  updateModeInfo();
}

// ============================================================
// ピン配置
// ============================================================
function placePins(h){
  pinMarkers.forEach(m=>m.setMap(null)); pinMarkers=[];
  const mk=(pos,color,lbl,title)=>{
    const m=new google.maps.Marker({ position:pos, map, title,
      icon:{ path:google.maps.SymbolPath.CIRCLE, scale:11,
        fillColor:color, fillOpacity:1, strokeColor:'#fff', strokeWeight:2 },
      label:{text:lbl,color:'#fff',fontSize:'11px',fontWeight:'bold'}
    });
    m.addListener('click',()=>{ if(appMode==='measure'&&measureClick) showDist(measureClick.getPosition(),m.getPosition(),title,lbl.toLowerCase()); });
    return m;
  };
  pinMarkers.push(mk(h.tee,   '#4a9fd4','T','ティー'));
  pinMarkers.push(mk(h.front, '#e05252','F','フロント'));
  pinMarkers.push(mk(h.center,'#a78bfa','C','センター'));
  pinMarkers.push(mk(h.back,  '#e8c84a','B','バック'));
}

// ============================================================
// 地図タップ
// ============================================================
function onMapClick(e){
  if(appMode==='measure') handleMeasureClick(e.latLng);
  else if(appMode==='record') openShotPanel(e.latLng);
}

// 測定モード
function handleMeasureClick(pos){
  if(measureClick) measureClick.setMap(null);
  if(measureLine)  measureLine.setMap(null);
  measureClick=new google.maps.Marker({
    position:pos, map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,
      fillColor:'#fff',fillOpacity:.9,strokeColor:'#4a9fd4',strokeWeight:2.5},
    zIndex:99
  });
  const h=hole(); if(!h||!hasData(h)) return;
  const targets=[
    {pos:h.front,name:'フロント',cls:'front'},
    {pos:h.center,name:'センター',cls:'center'},
    {pos:h.back,name:'バック',cls:'back'},
  ];
  let near=targets[0], minD=haversine(pos.lat(),pos.lng(),near.pos.lat,near.pos.lng);
  targets.slice(1).forEach(t=>{ const d=haversine(pos.lat(),pos.lng(),t.pos.lat,t.pos.lng); if(d<minD){minD=d;near=t;} });
  showDist(pos,new google.maps.LatLng(near.pos.lat,near.pos.lng),near.name,near.cls);
}

function showDist(from,to,label,cls=''){
  const m=haversine(from.lat(),from.lng(),to.lat(),to.lng());
  const yd=Math.round(m*1.09361);
  document.getElementById('yardVal').innerHTML=`${yd}<span>yd</span>`;
  document.getElementById('meterVal').textContent=`${Math.round(m)} m`;
  const tEl=document.getElementById('tgtLabel'); tEl.textContent=`→ ${label}`; tEl.className=`tgt ${cls}`;
  document.getElementById('distPanel').classList.add('show');
  if(measureLine) measureLine.setMap(null);
  measureLine=new google.maps.Polyline({
    path:[from,to],map,strokeColor:'#e8c84a',strokeOpacity:.85,strokeWeight:2,
    icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3},offset:'100%'}]
  });
}

function clearMeasure(){
  if(measureClick){measureClick.setMap(null);measureClick=null;}
  if(measureLine){measureLine.setMap(null);measureLine=null;}
  document.getElementById('distPanel').classList.remove('show');
}

// ============================================================
// ショットパネル
// ============================================================
function openShotPanel(pos){
  const h=hole(); if(!h||!hasData(h)) return;
  pendingPos=pos; selectedClub=null;

  const shots=currentShots();
  const shotNo=shots.length+1;
  document.getElementById('spTitle').textContent=`${shotNo}打目を登録`;

  // 飛距離：前のショットからの距離
  if(shots.length>0){
    const prev=shots[shots.length-1];
    const carry=Math.round(haversine(prev.lat,prev.lng,pos.lat(),pos.lng())*1.09361);
    document.getElementById('spCarry').innerHTML=`${carry}<span>yd</span>`;
  } else {
    document.getElementById('spCarry').innerHTML=`—<span>yd</span>`;
  }

  // 残り距離：センターピンまで
  const rem=Math.round(haversine(pos.lat(),pos.lng(),h.center.lat,h.center.lng)*1.09361);
  document.getElementById('spRemain').innerHTML=`${rem}<span>yd</span>`;

  // クラブグリッド
  document.getElementById('clubGrid').innerHTML=CLUBS.map(c=>
    `<button class="cb" onclick="selectClub('${c}')">${c}</button>`
  ).join('');
  document.getElementById('spOkBtn').disabled=true;

  document.getElementById('shotPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('show');
}

function selectClub(c){
  selectedClub=c;
  document.querySelectorAll('.cb').forEach(b=>b.classList.toggle('sel',b.textContent===c));
  document.getElementById('spOkBtn').disabled=false;
}

function confirmShot(){
  if(!pendingPos||!selectedClub) return;
  const h=hole(); if(!h) return;
  const key=holeKey();
  if(!roundShots[key]) roundShots[key]=[];
  const shots=roundShots[key];
  const shotNo=shots.length+1;

  let carry=null;
  if(shots.length>0){
    const prev=shots[shots.length-1];
    carry=Math.round(haversine(prev.lat,prev.lng,pendingPos.lat(),pendingPos.lng())*1.09361);
  }
  const remaining=Math.round(haversine(pendingPos.lat(),pendingPos.lng(),h.center.lat,h.center.lng)*1.09361);

  shots.push({no:shotNo,lat:pendingPos.lat(),lng:pendingPos.lng(),club:selectedClub,carry,remaining});

  saveRound();
  cancelShot();
  renderShotLayer();
  renderHoleStrip();
  updateModeInfo();
}

function cancelShot(){
  pendingPos=null; selectedClub=null;
  document.getElementById('shotPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('show');
}

// ============================================================
// ショットレイヤー描画
// ============================================================
function renderShotLayer(){
  clearShotLayer();
  const shots=currentShots();
  if(!shots.length) return;
  document.getElementById('legShot').style.display='flex';

  // 連結ライン
  const path=shots.map(s=>({lat:s.lat,lng:s.lng}));
  const line=new google.maps.Polyline({
    path,map,strokeColor:'#4caf50',strokeOpacity:.7,strokeWeight:2,
    icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:2.5},offset:'100%',repeat:'80px'}]
  });
  shotLines.push(line);

  // マーカー
  shots.forEach(s=>{
    const m=new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng}, map,
      icon:{
        path:google.maps.SymbolPath.CIRCLE,scale:13,
        fillColor:'#1e3a1e',fillOpacity:1,strokeColor:'#4caf50',strokeWeight:2
      },
      label:{text:`${s.no}`,color:'#4caf50',fontSize:'11px',fontWeight:'bold'},
      zIndex:50
    });
    m.addListener('click',()=>openReview());
    shotMarkers.push(m);
  });
}

function clearShotLayer(){
  shotMarkers.forEach(m=>m.setMap(null)); shotMarkers=[];
  shotLines.forEach(l=>l.setMap(null)); shotLines=[];
  document.getElementById('legShot').style.display='none';
}

// ============================================================
// レビューパネル（ホール内ショット一覧）
// ============================================================
function toggleReview(){ 
  document.getElementById('reviewPanel').classList.contains('open') ? closeReview() : openReview();
}
function openReview(){
  const shots=currentShots();
  const h=hole();
  document.getElementById('rvTitle').textContent=
    h ? `H${h.no} PAR${h.par} — ${shots.length}打` : 'ショット履歴';
  document.getElementById('rvList').innerHTML=shots.length
    ? shots.map(s=>`
        <div class="rv-shot">
          <div class="rv-no">${s.no}</div>
          <div class="rv-club">${s.club}</div>
          <div class="rv-dist">
            ${s.carry!==null?`飛距離 ${s.carry}yd　`:'1打目　'}残り ${s.remaining}yd
          </div>
          <button class="rv-del" onclick="deleteShot(${s.no-1})" title="削除">✕</button>
        </div>`).join('')
    : '<p style="color:var(--gr);font-size:12px;text-align:center;padding:16px;">まだショットが登録されていません</p>';
  document.getElementById('reviewPanel').classList.add('open');
}
function closeReview(){ document.getElementById('reviewPanel').classList.remove('open'); }

function deleteShot(idx){
  const key=holeKey();
  if(!roundShots[key]) return;
  roundShots[key].splice(idx,1);
  // 打数番号を振り直し
  roundShots[key].forEach((s,i)=>s.no=i+1);
  if(roundShots[key].length===0) delete roundShots[key];
  saveRound(); renderShotLayer(); renderHoleStrip(); openReview(); updateModeInfo();
}
function clearHoleShots(){
  const key=holeKey();
  delete roundShots[key];
  saveRound(); clearShotLayer(); renderHoleStrip(); closeReview(); updateModeInfo();
}

// ============================================================
// 履歴パネル
// ============================================================
function openHistory(){
  const rounds=JSON.parse(localStorage.getItem('golfRounds')||'[]');
  const list=document.getElementById('histList');
  if(rounds.length===0){
    list.innerHTML='<div class="hist-empty">まだラウンド記録がありません</div>'; 
  } else {
    list.innerHTML=rounds.map((r,i)=>{
      const holeCount=Object.keys(r.shots).length;
      const totalShots=Object.values(r.shots).reduce((a,v)=>a+v.length,0);
      return `<div class="hist-round" onclick="loadRound('${r.id}')">
        <div class="hr-title">${r.gcName} ${r.courseName}</div>
        <div class="hr-sub">${r.date}</div>
        <div class="hr-badges">
          <span class="hr-badge ${holeCount?'has':''}">${holeCount}ホール記録</span>
          <span class="hr-badge ${totalShots?'has':''}">${totalShots}打登録</span>
        </div>
      </div>`;
    }).join('')+`<button class="bb-btn danger" style="width:100%;margin-top:12px;" onclick="clearAllHistory()">すべての履歴を削除</button>`;
  }
  document.getElementById('histPanel').classList.add('open');
}
function closeHistory(){ document.getElementById('histPanel').classList.remove('open'); }

function loadRound(id){
  const rounds=JSON.parse(localStorage.getItem('golfRounds')||'[]');
  const r=rounds.find(x=>x.id===id);
  if(!r) return;
  roundId=r.id; roundShots=r.shots;
  closeHistory();
  renderHoleStrip(); renderShotLayer(); updateModeInfo();
}

function clearAllHistory(){
  if(!confirm('すべての履歴を削除しますか？')) return;
  localStorage.removeItem('golfRounds');
  updateHistBadge(); closeHistory();
}

// ============================================================
// GPS
// ============================================================
function toggleGPS(){ gpsActive?stopGPS():startGPS(); }
function startGPS(){
  if(!navigator.geolocation){alert('GPS非対応');return;}
  gpsActive=true;
  document.getElementById('gpsBtn').classList.add('active');
  gpsWatch=navigator.geolocation.watchPosition(pos=>{
    const ll={lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(!gpsMarker){
      gpsMarker=new google.maps.Marker({position:ll,map,title:'現在地',
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,
          fillColor:'#4a9fd4',fillOpacity:.9,strokeColor:'#fff',strokeWeight:2.5}
      });
    } else gpsMarker.setPosition(ll);
    // 記録モード中はGPSボタンタップでその場所でショットパネルを開く
  },err=>{alert('GPS取得失敗: '+err.message);stopGPS();},{enableHighAccuracy:true,maximumAge:3000});
}
function stopGPS(){
  gpsActive=false;
  document.getElementById('gpsBtn').classList.remove('active');
  if(gpsWatch){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}
  if(gpsMarker){gpsMarker.setMap(null);gpsMarker=null;}
}

// GPSで現在地をショット位置として登録
document.getElementById('gpsBtn').addEventListener('click', function(){
  if(appMode==='record'&&gpsActive&&gpsMarker&&map){
    openShotPanel(gpsMarker.getPosition());
  }
});

// ============================================================
// Haversine
// ============================================================
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,r=Math.PI/180;
  const dL=(lat2-lat1)*r, dN=(lng2-lng1)*r;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ============================================================
// ShotNavi リンク
// ============================================================
function updateSNLink(){
  const h=hole(),g=gc(),c=course();
  document.getElementById('snLink').href=
    (h&&g&&c)?`https://shotnavi.jp/gcguide/cdata/hdata2_${g.gcid}_${c.cid}_${h.no}.htm`:'#';
}

// Maps API コールバック

window.initMap=function(){ mapsLoaded=true; loadHole(); };

initSelects();
updateHistBadge();
