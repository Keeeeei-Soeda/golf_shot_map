<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>My Golf Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="logo">⛳ GOLF<small>TRACKER</small></div>
  <div class="hdr-sel">
    <select id="gcSel" onchange="onGCSel()"><option value="">-- ゴルフ場 --</option></select>
  </div>
  <div class="hdr-sel">
    <select id="courseSel" onchange="onCourseSel()"><option value="">-- コース --</option></select>
  </div>
  <button class="hdr-btn" id="gpsBtn" onclick="onGpsBtn()">📍</button>
  <a class="hdr-btn" id="snLink" href="#" target="_blank">🗺</a>
  <button class="hdr-btn" id="histBtn" onclick="openHistory()">
    📋<span class="hist-badge" id="histBadge"></span>
  </button>
</header>

<!-- ===== HOLE STRIP ===== -->
<div id="holeStrip"></div>

<!-- ===== MAP ===== -->
<div id="mapWrap">
  <div id="emptyMap"><div class="ico">⛳</div><p>ゴルフ場・コースを選択してください</p></div>
  <div id="map"></div>
  <div id="legend">
    <div class="leg-r"><div class="leg-dot" style="background:#4a9fd4"></div>ティー (T)</div>
    <div class="leg-r"><div class="leg-dot" style="background:#e05252"></div>フロント (F)</div>
    <div class="leg-r"><div class="leg-dot" style="background:#a78bfa"></div>センター (C)</div>
    <div class="leg-r"><div class="leg-dot" style="background:#e8c84a"></div>バック (B)</div>
    <div class="leg-r" id="legShot" style="display:none">
      <div class="leg-dot" style="background:#4caf50"></div>ショット軌跡
    </div>
  </div>
  <!-- ヤード情報パネル -->
  <div id="yardageInfo" style="display:none"></div>
  <div id="recBanner"></div>
</div>

<!-- ===== BOTTOM BAR ===== -->
<div id="bottomBar">
  <div class="mode-tabs">
    <button class="mtab active" id="tabMeasure" onclick="setMode('measure')">📏 測定</button>
    <button class="mtab rec"    id="tabRecord"  onclick="setMode('record')">🏌️ 記録</button>
  </div>
  <div class="mode-info" id="modeInfo">コースを選択してください</div>
  <button id="cupBtn" onclick="openCupPanel()">⛳ IN</button>
  <button class="bb-btn" id="reviewBtn" style="display:none" onclick="toggleReview()">📋</button>
  <button class="bb-btn" onclick="clearMeasure()">↺</button>
</div>

<!-- ===== 距離パネル（測定モード） ===== -->
<div id="distPanel">
  <div class="dp-row">
    <div class="dp-label" id="dpFromLabel">ティーから</div>
    <div class="dp-yd blue" id="dpTeeYd">—<span>yd</span></div>
    <div class="dp-to">（飛距離目安）</div>
  </div>
  <div class="dp-divider"></div>
  <div class="dp-row">
    <div class="dp-label">ここから</div>
    <div class="dp-yd yellow" id="dpPinYd">—<span>yd</span></div>
    <div class="dp-to" id="dpPinLabel">ピンまで</div>
  </div>
</div>

<!-- ===== ショット登録パネル（オーバーレイなし） ===== -->
<div id="shotPanel">
  <div class="sp-header">
    <div>
      <div class="sp-shotno" id="spShotNo">1打目を登録</div>
      <div class="sp-hint">地図をタップして落下地点を変更できます</div>
    </div>
    <button class="sp-close" onclick="cancelShot()">✕</button>
  </div>
  <div class="sp-dists">
    <div class="sp-dist-card carry">
      <div class="sdc-label">carry（飛距離）</div>
      <div class="sdc-from" id="spCarryFrom">ティーから</div>
      <div class="sdc-val blue" id="spCarry">—<span>yd</span></div>
    </div>
    <div class="sp-dist-card remain">
      <div class="sdc-label">remaining（残り）</div>
      <div class="sdc-from">センターピンまで</div>
      <div class="sdc-val yellow" id="spRemain">—<span>yd</span></div>
    </div>
  </div>
  <div class="club-grid" id="clubGrid"></div>
  <div class="sp-btns">
    <button class="sp-cancel" onclick="cancelShot()">キャンセル</button>
    <button class="sp-ok" id="spOkBtn" onclick="confirmShot()" disabled>登録する</button>
  </div>
</div>

<!-- ===== カップインパネル ===== -->
<div id="cupPanel">
  <div class="cup-title">⛳ カップイン</div>
  <div class="cup-score-area">
    <div class="cup-hole-info" id="cpHoleInfo"></div>
    <div class="cup-shots"><span id="cpShots">0</span><span>打</span></div>
    <div id="cpScoreLabel" class="cup-score-label"></div>
  </div>
  <div class="cup-manual">
    <div class="cup-manual-title">スコアを確認・変更（タップで変更）</div>
    <div class="cup-manual-btns" id="cpScoreBtns"></div>
  </div>
  <div class="cup-btns">
    <button class="cup-cancel" onclick="closeCupPanel()">キャンセル</button>
    <button class="cup-ok" onclick="confirmCupIn()">⛳ カップイン確定</button>
  </div>
</div>

<!-- ===== レビューパネル ===== -->
<div id="reviewOverlay" onclick="closeReview()"></div>
<div id="reviewPanel">
  <div class="rv-title" id="rvTitle">ショット履歴</div>
  <div id="rvList"></div>
  <button class="bb-btn danger" style="width:100%;margin-top:10px;" onclick="clearHoleShots()">
    このホールのショットをすべて削除
  </button>
</div>

<!-- ===== ホールサマリーパネル（⑤ カップイン後表示） ===== -->
<div id="holeSummaryPanel">
  <div class="hs-header">
    <div>
      <div class="hs-hole-info" id="hsHoleInfo">H1 PAR4　5打</div>
      <div class="hs-score-badge" id="hsScore">ボギー</div>
    </div>
    <div class="hs-title">ホールサマリー</div>
  </div>
  <div class="hs-section-title">📍 ショット詳細</div>
  <div id="hsShotList"></div>
  <div class="hs-section-title">📊 スコアカード</div>
  <div id="hsScoreCard"></div>
  <button class="hs-next-btn" onclick="closeHoleSummary()">次のホールへ ▶</button>
</div>

<!-- ===== 履歴パネル ===== -->
<div id="histPanel">
  <div class="hist-hdr">
    <h2>📋 ラウンド履歴</h2>
    <button class="hist-close" onclick="closeHistory()">✕</button>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<!-- ===== JS（読み込み順に注意） ===== -->
<script src="courses.js"></script>   <!-- ★ コースデータ（Keiさんが編集） -->
<script src="app.js"></script>       <!-- アプリロジック（基本触らない） -->
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBryPip32SP4e5y2RBSDyKLbxoz313JAgU&callback=initMap&language=ja">
</script>

</body>
</html>
