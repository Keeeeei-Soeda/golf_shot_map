<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>My Golf Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0f1f0f;--g1:#162816;--g2:#1e3a1e;--g3:#2d4f2d;--g4:#3d6b3d;
  --gv:#4caf50;--gvd:#388e3c;--w:#eef4ee;--gr:#7a957a;
  --acc:#e8c84a;--red:#e05252;--blue:#4a9fd4;--pur:#a78bfa;--org:#f59e0b;
  --eagle:#f472b6;--birdie:#60a5fa;--par:#4caf50;--bogey:#fb923c;--dbl:#ef4444;--tpl:#991b1b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gd);color:var(--w);display:flex;flex-direction:column;}

/* HEADER */
header{height:52px;flex-shrink:0;background:linear-gradient(135deg,#0a160a,var(--g1));
  border-bottom:2px solid var(--gv);display:flex;align-items:center;gap:8px;padding:0 10px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;color:var(--acc);flex-shrink:0;line-height:1;}
.logo small{display:block;font-size:9px;letter-spacing:2px;color:var(--gv);margin-top:-2px;}
.hdr-sel{position:relative;flex:1;min-width:0;}
.hdr-sel select{width:100%;appearance:none;background:rgba(255,255,255,.07);border:1px solid var(--g4);
  border-radius:6px;color:var(--w);padding:5px 24px 5px 8px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
.hdr-sel::after{content:'▾';position:absolute;right:7px;top:50%;transform:translateY(-50%);color:var(--gr);font-size:10px;pointer-events:none;}
.hdr-sel select option{background:#1e3a1e;}
.hdr-btn{flex-shrink:0;padding:5px 9px;border-radius:6px;border:1px solid var(--g4);
  background:rgba(255,255,255,.05);color:var(--gr);font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .15s;text-decoration:none;display:flex;align-items:center;gap:3px;}
.hdr-btn:hover{color:var(--w);background:rgba(255,255,255,.1);}
.hdr-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
#histBtn{position:relative;}
.hist-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;border-radius:8px;padding:1px 4px;display:none;}

/* HOLE STRIP */
#holeStrip{height:62px;flex-shrink:0;background:var(--g1);border-bottom:1px solid var(--g3);
  display:flex;align-items:center;gap:5px;padding:0 8px;overflow-x:auto;overflow-y:hidden;}
#holeStrip::-webkit-scrollbar{height:3px;}
#holeStrip::-webkit-scrollbar-thumb{background:var(--g4);}
.h-btn{flex-shrink:0;min-width:46px;padding:3px 5px;border-radius:6px;background:var(--g3);
  border:2px solid transparent;color:var(--w);font-size:11px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;font-family:inherit;position:relative;}
.h-btn:hover{border-color:var(--g4);}
.h-btn.active{border-color:var(--acc);color:var(--acc);background:var(--g2);}
.h-btn.no-data{opacity:.4;}
.h-btn .par{display:block;font-size:9px;font-weight:400;color:var(--gr);margin-top:1px;}
.h-btn.active .par{color:var(--acc);opacity:.7;}
.h-btn .sdot{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--gv);}
/* スコアバッジ */
.h-btn .sbadge{display:block;font-size:9px;font-weight:700;margin-top:2px;border-radius:4px;padding:0 3px;line-height:14px;}
.sbadge.eagle {background:var(--eagle);color:#fff;}
.sbadge.birdie{background:var(--birdie);color:#fff;}
.sbadge.par   {background:var(--par);  color:#fff;}
.sbadge.bogey {background:var(--bogey);color:#fff;}
.sbadge.dbl   {background:var(--dbl);  color:#fff;}
.sbadge.tpl   {background:var(--tpl);  color:#fff;}
.sbadge.other {background:var(--gr);   color:#fff;}
.sbadge.cupin {background:var(--gv);   color:#fff;}

/* MAP */
#mapWrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;display:none;}
#emptyMap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--gr);}
#emptyMap .ico{font-size:46px;}

/* LEGEND */
#legend{position:absolute;top:8px;left:8px;z-index:5;background:rgba(10,22,10,.88);
  border:1px solid var(--g4);border-radius:8px;padding:7px 11px;pointer-events:none;display:none;}
.leg-r{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--w);margin-bottom:3px;}
.leg-r:last-child{margin-bottom:0;}
.leg-dot{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.6);flex-shrink:0;}

/* 記録モードバナー */
#recBanner{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:6;
  background:rgba(245,158,11,.92);border-radius:20px;padding:6px 16px;
  font-size:12px;font-weight:700;color:#000;pointer-events:none;display:none;white-space:nowrap;}

/* BOTTOM BAR */
#bottomBar{height:50px;flex-shrink:0;background:var(--g1);border-top:1px solid var(--g3);
  display:flex;align-items:center;gap:6px;padding:0 10px;}
.mode-tabs{display:flex;gap:4px;flex-shrink:0;}
.mtab{padding:5px 10px;border-radius:6px;border:1px solid var(--g3);background:rgba(255,255,255,.04);
  color:var(--gr);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.mtab:hover{background:rgba(255,255,255,.1);}
.mtab.active{background:var(--gv);border-color:var(--gv);color:#fff;font-weight:700;}
.mtab.rec.active{background:var(--org);border-color:var(--org);}
.mode-info{font-size:11px;color:var(--gr);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mode-info strong{color:var(--gv);}
.mode-info strong.rec{color:var(--org);}
/* カップインボタン（記録モード時のみ表示） */
#cupBtn{flex-shrink:0;padding:6px 11px;border-radius:6px;background:rgba(76,175,80,.15);
  border:1px solid var(--gv);color:var(--gv);font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .15s;display:none;font-weight:700;}
#cupBtn:hover{background:rgba(76,175,80,.3);}
.bb-btn{flex-shrink:0;padding:6px 10px;border-radius:6px;background:var(--g3);border:1px solid var(--g4);
  color:var(--w);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.bb-btn:hover{background:var(--g4);}
.bb-btn.danger{border-color:var(--red);color:var(--red);}
.bb-btn.danger:hover{background:rgba(224,82,82,.15);}

/* DIST PANEL */
#distPanel{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);
  background:rgba(10,22,10,.95);border:1px solid var(--gv);border-radius:12px;
  padding:10px 16px;text-align:center;min-width:230px;z-index:50;display:none;pointer-events:none;}
#distPanel.show{display:block;}
.dp-row{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:4px;}
.dp-row:last-child{margin-bottom:0;}
.dp-label{font-size:9px;color:var(--gr);min-width:56px;text-align:right;}
.dp-yd{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;min-width:80px;text-align:center;}
.dp-yd span{font-size:13px;color:var(--gr);margin-left:1px;}
.dp-yd.blue{color:var(--blue);}
.dp-yd.yellow{color:var(--acc);}
.dp-to{font-size:9px;color:var(--gr);min-width:56px;text-align:left;}
.dp-divider{height:1px;background:rgba(255,255,255,.08);margin:2px 8px;}

/* SHOT PANEL (no overlay) */
#shotPanel{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--g1);
  border-top:2px solid var(--org);border-radius:16px 16px 0 0;padding:12px 14px 22px;
  transform:translateY(100%);transition:transform .25s ease;}
#shotPanel.open{transform:translateY(0);}
.sp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.sp-shotno{font-size:14px;font-weight:700;color:var(--org);}
.sp-hint{font-size:10px;color:var(--gr);margin-top:2px;}
.sp-close{background:none;border:none;color:var(--gr);font-size:18px;cursor:pointer;padding:0 4px;}
.sp-dists{display:flex;gap:8px;margin-bottom:10px;}
.sp-dist-card{flex:1;border-radius:8px;padding:7px 10px;text-align:center;}
.sp-dist-card.carry{background:rgba(74,159,212,.15);border:1px solid rgba(74,159,212,.4);}
.sp-dist-card.remain{background:rgba(232,200,74,.12);border:1px solid rgba(232,200,74,.35);}
.sdc-label{font-size:9px;letter-spacing:1px;color:var(--gr);text-transform:uppercase;margin-bottom:1px;}
.sdc-from{font-size:9px;color:var(--gr);margin-bottom:2px;}
.sdc-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.sdc-val span{font-size:11px;color:var(--gr);margin-left:1px;}
.sdc-val.blue{color:var(--blue);}
.sdc-val.yellow{color:var(--acc);}
.club-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.cb{padding:7px 10px;border-radius:6px;background:var(--g3);border:1px solid var(--g4);
  color:var(--w);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;min-width:46px;text-align:center;}
.cb:hover{background:var(--g4);}
.cb.sel{background:var(--org);border-color:var(--org);color:#000;}
.sp-btns{display:flex;gap:8px;}
.sp-ok{flex:1;padding:11px;border-radius:8px;background:var(--gv);border:none;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.sp-ok:hover{background:var(--gvd);}
.sp-ok:disabled{background:var(--g3);color:var(--gr);cursor:default;}
.sp-cancel{padding:11px 14px;border-radius:8px;background:var(--g3);border:1px solid var(--g4);
  color:var(--gr);font-size:13px;cursor:pointer;font-family:inherit;}

/* CUP-IN CONFIRM PANEL */
#cupPanel{position:fixed;bottom:0;left:0;right:0;z-index:65;background:var(--g1);
  border-top:2px solid var(--gv);border-radius:16px 16px 0 0;padding:16px 16px 28px;
  transform:translateY(100%);transition:transform .25s ease;}
#cupPanel.open{transform:translateY(0);}
.cup-title{font-size:15px;font-weight:700;color:var(--gv);margin-bottom:12px;text-align:center;}
.cup-score-area{background:var(--g2);border-radius:10px;padding:14px;margin-bottom:14px;text-align:center;}
.cup-hole-info{font-size:12px;color:var(--gr);margin-bottom:6px;}
.cup-shots{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--acc);line-height:1;}
.cup-shots span{font-size:18px;color:var(--gr);margin-left:4px;}
.cup-score-label{display:inline-block;margin-top:8px;padding:4px 14px;border-radius:20px;
  font-size:13px;font-weight:700;}
/* 手動スコア入力（スコアカードがない場合） */
.cup-manual{margin-bottom:14px;}
.cup-manual-title{font-size:11px;color:var(--gr);margin-bottom:6px;}
.cup-manual-btns{display:flex;gap:6px;flex-wrap:wrap;}
.score-btn{flex:1;min-width:56px;padding:8px 4px;border-radius:8px;border:1px solid var(--g4);
  background:var(--g3);color:var(--w);font-size:11px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;text-align:center;}
.score-btn:hover{background:var(--g4);}
.score-btn.sel{border-width:2px;}
.score-btn.eagle{border-color:var(--eagle);color:var(--eagle);}
.score-btn.eagle.sel{background:var(--eagle);color:#fff;}
.score-btn.birdie{border-color:var(--birdie);color:var(--birdie);}
.score-btn.birdie.sel{background:var(--birdie);color:#fff;}
.score-btn.par{border-color:var(--par);color:var(--par);}
.score-btn.par.sel{background:var(--par);color:#fff;}
.score-btn.bogey{border-color:var(--bogey);color:var(--bogey);}
.score-btn.bogey.sel{background:var(--bogey);color:#fff;}
.score-btn.dbl{border-color:var(--dbl);color:var(--dbl);}
.score-btn.dbl.sel{background:var(--dbl);color:#fff;}
.score-btn.tpl{border-color:var(--tpl);color:var(--tpl);}
.score-btn.tpl.sel{background:var(--tpl);color:#fff;}
.cup-btns{display:flex;gap:8px;}
.cup-ok{flex:1;padding:12px;border-radius:8px;background:var(--gv);border:none;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.cup-ok:hover{background:var(--gvd);}
.cup-cancel{padding:12px 14px;border-radius:8px;background:var(--g3);border:1px solid var(--g4);
  color:var(--gr);font-size:13px;cursor:pointer;font-family:inherit;}

/* REVIEW PANEL */
#reviewOverlay{position:fixed;inset:0;z-index:54;display:none;background:rgba(0,0,0,.35);}
#reviewOverlay.show{display:block;}
#reviewPanel{position:fixed;bottom:0;left:0;right:0;z-index:55;background:var(--g1);
  border-top:2px solid var(--acc);border-radius:16px 16px 0 0;padding:12px 14px 28px;
  max-height:70%;overflow-y:auto;transform:translateY(100%);transition:transform .28s ease;}
#reviewPanel.open{transform:translateY(0);}
.rv-title{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.rv-score-badge{padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;}
.rv-shot{display:flex;align-items:flex-start;gap:10px;padding:10px;background:var(--g2);border-radius:8px;margin-bottom:6px;}
.rv-no{width:28px;height:28px;border-radius:50%;background:var(--gv);color:#fff;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rv-no.cupin{background:var(--acc);color:#000;}
.rv-body{flex:1;min-width:0;}
.rv-club{font-size:14px;font-weight:700;color:var(--w);}
.rv-line{font-size:11px;color:var(--gr);margin-top:2px;line-height:1.7;}
.rv-line .hi{color:var(--blue);}
.rv-line .hi.y{color:var(--acc);}
.rv-del{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:2px 6px;flex-shrink:0;}

/* HISTORY PANEL */
#histPanel{position:fixed;inset:0;z-index:70;background:var(--gd);display:none;flex-direction:column;overflow:hidden;}
#histPanel.open{display:flex;}
.hist-hdr{height:52px;flex-shrink:0;background:var(--g1);border-bottom:2px solid var(--acc);
  display:flex;align-items:center;padding:0 14px;gap:10px;}
.hist-hdr h2{font-size:15px;color:var(--acc);flex:1;}
.hist-close{background:none;border:none;color:var(--gr);font-size:20px;cursor:pointer;padding:4px;}
.hist-list{flex:1;overflow-y:auto;padding:12px;}
.hist-round{background:var(--g2);border:1px solid var(--g3);border-radius:10px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.hist-round:hover{border-color:var(--acc);}
.hr-title{font-size:13px;font-weight:700;color:var(--w);}
.hr-sub{font-size:11px;color:var(--gr);margin-top:3px;}
.hr-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.hr-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--g3);color:var(--gr);}
.hr-badge.has{background:rgba(76,175,80,.2);color:var(--gv);}
/* スコアサマリー */
.hr-score-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;margin-top:8px;}
.hr-score-cell{text-align:center;font-size:9px;padding:3px 1px;border-radius:4px;background:var(--g3);}
.hr-score-cell .hn{color:var(--gr);}
.hr-score-cell .sv{font-weight:700;margin-top:1px;}
.hr-total{margin-top:6px;font-size:11px;color:var(--gr);text-align:right;}
.hr-total strong{color:var(--acc);}
.hist-empty{text-align:center;color:var(--gr);margin-top:40px;font-size:13px;}
</style>
</head>
<body>

<header>
  <div class="logo">⛳ GOLF<small>TRACKER</small></div>
  <div class="hdr-sel"><select id="gcSel" onchange="onGCSel()"><option value="">-- ゴルフ場 --</option></select></div>
  <div class="hdr-sel"><select id="courseSel" onchange="onCourseSel()"><option value="">-- コース --</option></select></div>
  <button class="hdr-btn" id="gpsBtn" onclick="onGpsBtn()">📍</button>
  <a class="hdr-btn" id="snLink" href="#" target="_blank">🗺</a>
  <button class="hdr-btn" id="histBtn" onclick="openHistory()">📋<span class="hist-badge" id="histBadge"></span></button>
</header>

<div id="holeStrip"></div>

<div id="mapWrap">
  <div id="emptyMap"><div class="ico">⛳</div><p>ゴルフ場・コースを選択してください</p></div>
  <div id="map"></div>
  <div id="legend">
    <div class="leg-r"><div class="leg-dot" style="background:var(--blue)"></div>ティー (T)</div>
    <div class="leg-r"><div class="leg-dot" style="background:var(--red)"></div>フロント (F)</div>
    <div class="leg-r"><div class="leg-dot" style="background:var(--pur)"></div>センター (C)</div>
    <div class="leg-r"><div class="leg-dot" style="background:var(--acc)"></div>バック (B)</div>
    <div class="leg-r" id="legShot" style="display:none"><div class="leg-dot" style="background:var(--gv)"></div>ショット軌跡</div>
  </div>
  <div id="recBanner"></div>
</div>

<div id="bottomBar">
  <div class="mode-tabs">
    <button class="mtab active" id="tabMeasure" onclick="setMode('measure')">📏 測定</button>
    <button class="mtab rec"    id="tabRecord"  onclick="setMode('record')">🏌️ 記録</button>
  </div>
  <div class="mode-info" id="modeInfo">コースを選択してください</div>
  <button id="cupBtn" onclick="openCupPanel()">⛳ IN</button>
  <button class="bb-btn" id="reviewBtn" style="display:none" onclick="toggleReview()">📋</button>
  <button class="bb-btn" onclick="clearMeasure()">↺</button>
</div>

<!-- 測定距離パネル -->
<div id="distPanel">
  <div class="dp-row">
    <div class="dp-label">ティーから</div>
    <div class="dp-yd blue" id="dpTeeYd">—<span>yd</span></div>
    <div class="dp-to">（飛距離目安）</div>
  </div>
  <div class="dp-divider"></div>
  <div class="dp-row">
    <div class="dp-label">ここから</div>
    <div class="dp-yd yellow" id="dpPinYd">—<span>yd</span></div>
    <div class="dp-to" id="dpPinLabel">ピンまで</div>
  </div>
</div>

<!-- ショット登録パネル（オーバーレイなし） -->
<div id="shotPanel">
  <div class="sp-header">
    <div>
      <div class="sp-shotno" id="spShotNo">1打目を登録</div>
      <div class="sp-hint">地図をタップして落下地点を変更できます</div>
    </div>
    <button class="sp-close" onclick="cancelShot()">✕</button>
  </div>
  <div class="sp-dists">
    <div class="sp-dist-card carry">
      <div class="sdc-label">carry（飛距離）</div>
      <div class="sdc-from" id="spCarryFrom">ティーから</div>
      <div class="sdc-val blue" id="spCarry">—<span>yd</span></div>
    </div>
    <div class="sp-dist-card remain">
      <div class="sdc-label">remaining（残り）</div>
      <div class="sdc-from">センターピンまで</div>
      <div class="sdc-val yellow" id="spRemain">—<span>yd</span></div>
    </div>
  </div>
  <div class="club-grid" id="clubGrid"></div>
  <div class="sp-btns">
    <button class="sp-cancel" onclick="cancelShot()">キャンセル</button>
    <button class="sp-ok" id="spOkBtn" onclick="confirmShot()" disabled>登録する</button>
  </div>
</div>

<!-- カップインパネル -->
<div id="cupPanel">
  <div class="cup-title">⛳ カップイン</div>
  <div class="cup-score-area">
    <div class="cup-hole-info" id="cpHoleInfo"></div>
    <div class="cup-shots"><span id="cpShots">0</span><span>打</span></div>
    <div id="cpScoreLabel" class="cup-score-label"></div>
  </div>
  <!-- スコアを手動で上書きできる -->
  <div class="cup-manual">
    <div class="cup-manual-title">スコアを確認・変更（タップで変更）</div>
    <div class="cup-manual-btns" id="cpScoreBtns"></div>
  </div>
  <div class="cup-btns">
    <button class="cup-cancel" onclick="closeCupPanel()">キャンセル</button>
    <button class="cup-ok" onclick="confirmCupIn()">⛳ カップイン確定</button>
  </div>
</div>

<!-- レビューパネル -->
<div id="reviewOverlay" onclick="closeReview()"></div>
<div id="reviewPanel">
  <div class="rv-title" id="rvTitle">ショット履歴</div>
  <div id="rvList"></div>
  <button class="bb-btn danger" style="width:100%;margin-top:10px;" onclick="clearHoleShots()">このホールのショットをすべて削除</button>
</div>

<!-- 履歴パネル -->
<div id="histPanel">
  <div class="hist-hdr"><h2>📋 ラウンド履歴</h2><button class="hist-close" onclick="closeHistory()">✕</button></div>
  <div class="hist-list" id="histList"></div>
</div>

<script>
// ============================================================
// ★ コースデータ ★
// ============================================================
const COURSES = [
  {
    name:'ローズゴルフクラブ', pref:'滋賀県', gcid:970, lat:34.8924, lng:136.0535,
    courses:[
      {
        name:'アウト', cid:1312,
        holes:[
          { no:1,par:5, tee:{lat:34.892567,lng:136.051814}, front:{lat:34.892015,lng:136.056338}, center:{lat:34.892025,lng:136.056534}, back:{lat:34.892010,lng:136.056733} },
          { no:2,par:4, tee:{lat:34.892468,lng:136.057524}, front:{lat:34.893836,lng:136.055347}, center:{lat:34.893976,lng:136.055313}, back:{lat:34.894094,lng:136.055283} },
          { no:3,par:3, tee:{lat:34.894491,lng:136.055709}, front:{lat:34.893656,lng:136.056758}, center:{lat:34.893573,lng:136.056885}, back:{lat:34.893475,lng:136.056991} },
          { no:4,par:4, tee:{lat:34.894440,lng:136.057040}, front:{lat:34.892230,lng:136.059981}, center:{lat:34.892151,lng:136.060141}, back:{lat:34.892084,lng:136.060289} },
          { no:5,par:4, tee:null,front:null,center:null,back:null },
          { no:6,par:4, tee:null,front:null,center:null,back:null },
          { no:7,par:5, tee:null,front:null,center:null,back:null },
          { no:8,par:3, tee:null,front:null,center:null,back:null },
          { no:9,par:4, tee:null,front:null,center:null,back:null },
        ]
      },
      {
        name:'イン', cid:1313,
        holes:[...[1,2,3,4,5,6,7,8,9].map(n=>({no:n,par:4,tee:null,front:null,center:null,back:null}))]
      },
    ]
  },
];

const CLUBS = ['1W','3W','5W','4H','5H','3I','4I','5I','6I','7I','8I','9I','PW','AW','SW','PT'];

// スコア名 → CSS class
const SCORE_DEFS = [
  { diff:-2, name:'イーグル',      cls:'eagle' },
  { diff:-1, name:'バーディ',      cls:'birdie' },
  { diff: 0, name:'パー',          cls:'par' },
  { diff: 1, name:'ボギー',        cls:'bogey' },
  { diff: 2, name:'ダブルボギー',  cls:'dbl' },
  { diff: 3, name:'トリプルボギー',cls:'tpl' },
];

function scoreDef(diff){
  return SCORE_DEFS.find(d=>d.diff===diff) || { diff, name:`+${diff}`, cls:'other' };
}
function calcScoreDiff(shots, par){ return shots - par; }

// ============================================================
// 状態
// ============================================================
let map=null, mapsLoaded=false;
let st={ gcIdx:null, cIdx:null, hIdx:0 };
let appMode='measure';
let measureClick=null, teeLine=null, pinLine=null;
let shotMarkers=[], shotLines=[];
let pendingPos=null, selectedClub=null;
let pendingMarker=null, pendingCarryLine=null, pendingPinLine=null;
let pendingCarryLabel=null, pendingPinLabel=null;
let gpsMarker=null, gpsWatch=null, gpsActive=false;
let roundShots={}, roundId=null;
let cpSelectedDiff=null; // カップインパネルで選択中のスコア差

const gc      = ()=> st.gcIdx!==null ? COURSES[st.gcIdx] : null;
const course  = ()=> gc()&&st.cIdx!==null ? gc().courses[st.cIdx] : null;
const hole    = ()=> course() ? course().holes[st.hIdx] : null;
const hasData = (h)=> h&&h.tee&&h.front;
const holeKey = ()=> `${st.gcIdx}_${st.cIdx}_${st.hIdx}`;
const curShots= ()=> roundShots[holeKey()]||[];

// ============================================================
// セレクタ
// ============================================================
function initSelects(){
  const s=document.getElementById('gcSel');
  COURSES.forEach((c,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=`${c.name}（${c.pref}）`; s.appendChild(o); });
}
function onGCSel(){
  const v=document.getElementById('gcSel').value;
  st.gcIdx=v===''?null:parseInt(v); st.cIdx=null; st.hIdx=0;
  const cs=document.getElementById('courseSel');
  cs.innerHTML='<option value="">-- コース --</option>';
  if(gc()) gc().courses.forEach((c,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=c.name; cs.appendChild(o); });
  roundShots={}; roundId=`round_${Date.now()}`; updateSNLink();
}
function onCourseSel(){
  const v=document.getElementById('courseSel').value;
  st.cIdx=v===''?null:parseInt(v); st.hIdx=0;
  renderStrip(); loadHole(); updateSNLink();
}

// ============================================================
// 保存
// ============================================================
function saveRound(){
  if(!gc()||!course()||!roundId) return;
  const all=JSON.parse(localStorage.getItem('golfRounds')||'[]');
  const idx=all.findIndex(r=>r.id===roundId);
  const data={ id:roundId, date:new Date().toLocaleDateString('ja-JP'),
    gcName:gc().name, courseName:course().name, shots:roundShots, updatedAt:Date.now() };
  if(idx>=0) all[idx]=data; else all.unshift(data);
  localStorage.setItem('golfRounds',JSON.stringify(all.slice(0,30)));
  updateBadge();
}
function updateBadge(){
  const all=JSON.parse(localStorage.getItem('golfRounds')||'[]');
  const b=document.getElementById('histBadge');
  b.textContent=all.length; b.style.display=all.length?'block':'none';
}

// ============================================================
// ホールストリップ（スコアバッジつき）
// ============================================================
function renderStrip(){
  const strip=document.getElementById('holeStrip');
  if(!course()){ strip.innerHTML=''; return; }
  strip.innerHTML=course().holes.map((h,i)=>{
    const key=`${st.gcIdx}_${st.cIdx}_${i}`;
    const shots=roundShots[key]||[];
    const holeData=roundShots[`${key}_meta`]||{};
    let badge='';
    if(holeData.cupIn){
      const sd=scoreDef(holeData.scoreDiff);
      const label=holeData.scoreDiff===0?'E':holeData.scoreDiff>0?`+${holeData.scoreDiff}`:String(holeData.scoreDiff);
      badge=`<span class="sbadge ${sd.cls}">${label}</span>`;
    } else if(shots.length){
      badge=`<span class="sbadge cupin">${shots.length}打</span>`;
    }
    return `<button class="h-btn ${i===st.hIdx?'active':''} ${!hasData(h)?'no-data':''}" onclick="selectHole(${i})">
      ${h.no}H<span class="par">PAR${h.par}</span>${badge}
    </button>`;
  }).join('');
}
function selectHole(i){ st.hIdx=i; renderStrip(); loadHole(); closeReview(); updateSNLink(); }

// ============================================================
// モード切替
// ============================================================
function setMode(m){
  appMode=m;
  document.getElementById('tabMeasure').classList.toggle('active',m==='measure');
  document.getElementById('tabRecord').classList.toggle('active',m==='record');
  clearMeasure(); clearPending(); updateInfo(); updateRecBanner(); updateCupBtn();
}
function updateInfo(){
  const h=hole(); const n=curShots().length+1;
  if(appMode==='measure')
    document.getElementById('modeInfo').innerHTML=
      h&&hasData(h)?`<strong>H${h.no} PAR${h.par}</strong> タップ → ティーからの距離＋残り距離`:'コースを選択';
  else
    document.getElementById('modeInfo').innerHTML=
      h&&hasData(h)?`<strong class="rec">🏌️ 記録</strong> ${n}打目 — 落下地点をタップ`:'座標未登録';
}
function updateRecBanner(){
  const banner=document.getElementById('recBanner');
  if(appMode!=='record'||!hole()||!hasData(hole())||document.getElementById('shotPanel').classList.contains('open')){
    banner.style.display='none'; return;
  }
  const shots=curShots(); const n=shots.length+1;
  banner.textContent=`${n}打目 — ${shots.length===0?'ティーから':`${shots.length}打目から`}の落下地点をタップ`;
  banner.style.display='block';
}
function updateCupBtn(){
  const btn=document.getElementById('cupBtn');
  const show=appMode==='record'&&hole()&&hasData(hole());
  btn.style.display=show?'block':'none';
}

// ============================================================
// 地図ロード
// ============================================================
function loadHole(){
  const h=hole();
  document.getElementById('reviewBtn').style.display='none';
  updateCupBtn();
  if(!h||!hasData(h)){
    document.getElementById('map').style.display='none';
    document.getElementById('emptyMap').style.display='flex';
    document.getElementById('emptyMap').querySelector('p').textContent=
      h?`${h.no}番ホールの座標はまだ登録されていません`:'コースを選択してください';
    document.getElementById('legend').style.display='none';
    document.getElementById('recBanner').style.display='none';
    clearMeasure(); clearPending(); clearShotLayer(); updateInfo(); return;
  }
  document.getElementById('emptyMap').style.display='none';
  document.getElementById('map').style.display='block';
  document.getElementById('legend').style.display='block';
  document.getElementById('reviewBtn').style.display='flex';
  clearMeasure(); clearPending();
  if(!mapsLoaded) return;
  if(!map){
    map=new google.maps.Map(document.getElementById('map'),{
      center:{lat:h.tee.lat,lng:h.tee.lng},zoom:17,
      mapTypeId:'satellite',tilt:0,
      disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy',
      zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_CENTER}
    });
    map.addListener('click',onMapClick);
  } else {
    const b=new google.maps.LatLngBounds();
    [h.tee,h.front,h.back].forEach(p=>b.extend(p));
    map.fitBounds(b,{top:60,bottom:60,left:40,right:40});
  }
  placePins(h); renderShotLayer(); updateInfo(); updateRecBanner();
}

// ============================================================
// ピン
// ============================================================
function placePins(h){
  if(window._pins) window._pins.forEach(m=>m.setMap(null));
  window._pins=[];
  const mk=(pos,color,lbl,title)=>{
    const m=new google.maps.Marker({ position:pos,map,title,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:11,fillColor:color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
      label:{text:lbl,color:'#fff',fontSize:'11px',fontWeight:'bold'}
    });
    m.addListener('click',()=>{ if(appMode==='measure'&&measureClick) showDists(measureClick.getPosition()); });
    return m;
  };
  window._pins.push(mk(h.tee,   '#4a9fd4','T','ティー'));
  window._pins.push(mk(h.front, '#e05252','F','フロント'));
  window._pins.push(mk(h.center,'#a78bfa','C','センター'));
  window._pins.push(mk(h.back,  '#e8c84a','B','バック'));
}

// ============================================================
// 地図タップ
// ============================================================
function onMapClick(e){
  if(appMode==='measure'){ handleMeasure(e.latLng); return; }
  updatePendingPos(e.latLng);
  if(!document.getElementById('shotPanel').classList.contains('open')) openShotPanelUI();
}

// ============================================================
// 測定モード
// ============================================================
function handleMeasure(pos){
  if(measureClick) measureClick.setMap(null);
  if(teeLine){teeLine.setMap(null);teeLine=null;}
  if(pinLine){pinLine.setMap(null);pinLine=null;}
  measureClick=new google.maps.Marker({
    position:pos,map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#fff',fillOpacity:.9,strokeColor:'#4a9fd4',strokeWeight:2.5},
    zIndex:99
  });
  showDists(pos);
}
function showDists(pos){
  const h=hole(); if(!h||!hasData(h)) return;
  const teeYd=Math.round(haversine(h.tee.lat,h.tee.lng,pos.lat(),pos.lng())*1.09361);
  const targets=[
    {pos:h.front,name:'フロント'},{pos:h.center,name:'センター'},{pos:h.back,name:'バック'}
  ];
  let near=targets[0], minD=haversine(pos.lat(),pos.lng(),near.pos.lat,near.pos.lng);
  targets.slice(1).forEach(t=>{ const d=haversine(pos.lat(),pos.lng(),t.pos.lat,t.pos.lng); if(d<minD){minD=d;near=t;} });
  document.getElementById('dpTeeYd').innerHTML=`${teeYd}<span>yd</span>`;
  document.getElementById('dpPinYd').innerHTML=`${Math.round(minD*1.09361)}<span>yd</span>`;
  document.getElementById('dpPinLabel').textContent=`${near.name}まで`;
  document.getElementById('distPanel').classList.add('show');
  if(teeLine) teeLine.setMap(null);
  teeLine=new google.maps.Polyline({path:[{lat:h.tee.lat,lng:h.tee.lng},pos],map,strokeColor:'#4a9fd4',strokeOpacity:.7,strokeWeight:2,icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:2.5},offset:'100%'}]});
  if(pinLine) pinLine.setMap(null);
  pinLine=new google.maps.Polyline({path:[pos,{lat:near.pos.lat,lng:near.pos.lng}],map,strokeColor:'#e8c84a',strokeOpacity:.85,strokeWeight:2,icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:2.5},offset:'100%'}]});
}
function clearMeasure(){
  if(measureClick){measureClick.setMap(null);measureClick=null;}
  if(teeLine){teeLine.setMap(null);teeLine=null;}
  if(pinLine){pinLine.setMap(null);pinLine=null;}
  document.getElementById('distPanel').classList.remove('show');
}

// ============================================================
// ペンディング（位置確定前）
// ============================================================
function updatePendingPos(pos){
  const h=hole(); if(!h||!hasData(h)) return;
  pendingPos=pos;
  const shots=curShots();
  const prevIsTee=shots.length===0;
  const prevPos=prevIsTee?{lat:h.tee.lat,lng:h.tee.lng}:{lat:shots[shots.length-1].lat,lng:shots[shots.length-1].lng};
  const carryYd=Math.round(haversine(prevPos.lat,prevPos.lng,pos.lat(),pos.lng())*1.09361);
  const remYd=Math.round(haversine(pos.lat(),pos.lng(),h.center.lat,h.center.lng)*1.09361);
  document.getElementById('spCarry').innerHTML=`${carryYd}<span>yd</span>`;
  document.getElementById('spRemain').innerHTML=`${remYd}<span>yd</span>`;
  document.getElementById('spCarryFrom').textContent=prevIsTee?'ティーから':`${shots.length}打目地点から`;
  if(pendingMarker) pendingMarker.setPosition(pos);
  else {
    pendingMarker=new google.maps.Marker({
      position:pos,map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:13,fillColor:'#f59e0b',fillOpacity:.85,strokeColor:'#fff',strokeWeight:2},
      label:{text:`${shots.length+1}`,color:'#000',fontSize:'11px',fontWeight:'bold'},
      zIndex:100
    });
  }
  if(pendingCarryLine) pendingCarryLine.setMap(null);
  pendingCarryLine=new google.maps.Polyline({path:[prevPos,{lat:pos.lat(),lng:pos.lng()}],map,strokeColor:'#4a9fd4',strokeOpacity:.75,strokeWeight:2.5,icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3},offset:'100%'}]});
  if(pendingPinLine) pendingPinLine.setMap(null);
  pendingPinLine=new google.maps.Polyline({path:[{lat:pos.lat(),lng:pos.lng()},{lat:h.center.lat,lng:h.center.lng}],map,strokeColor:'#e8c84a',strokeOpacity:.8,strokeWeight:2,icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:2.5},offset:'100%'}]});
  if(pendingCarryLabel) pendingCarryLabel.setMap(null);
  pendingCarryLabel=makeLabel({lat:(prevPos.lat+pos.lat())/2,lng:(prevPos.lng+pos.lng())/2},`${carryYd}yd`,'#000','#4a9fd4');
  if(pendingPinLabel) pendingPinLabel.setMap(null);
  pendingPinLabel=makeLabel({lat:(pos.lat()+h.center.lat)/2,lng:(pos.lng()+h.center.lng)/2},`残${remYd}yd`,'#000','#e8c84a');
}
function makeLabel(pos,text,tc,bg){
  const w=text.length*8+14;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="20"><rect x="0" y="0" width="${w}" height="20" rx="5" fill="${bg}" fill-opacity="0.9"/><text x="${w/2}" y="14" text-anchor="middle" fill="${tc}" font-size="11" font-weight="bold" font-family="Arial,sans-serif">${text}</text></svg>`;
  return new google.maps.Marker({position:pos,map,icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(w,20),anchor:new google.maps.Point(w/2,10)},zIndex:55,clickable:false});
}
function clearPending(){
  [pendingMarker,pendingCarryLine,pendingPinLine,pendingCarryLabel,pendingPinLabel].forEach(x=>{if(x){x.setMap(null);}});
  pendingMarker=pendingCarryLine=pendingPinLine=pendingCarryLabel=pendingPinLabel=null;
}

// ============================================================
// ショットパネル
// ============================================================
function openShotPanelUI(){
  const shots=curShots();
  document.getElementById('spShotNo').textContent=`${shots.length+1}打目を登録`;
  document.getElementById('clubGrid').innerHTML=CLUBS.map(c=>`<button class="cb" onclick="selectClub('${c}')">${c}</button>`).join('');
  document.getElementById('spOkBtn').disabled=true;
  selectedClub=null;
  document.getElementById('shotPanel').classList.add('open');
  document.getElementById('recBanner').style.display='none';
}
function selectClub(c){
  selectedClub=c;
  document.querySelectorAll('.cb').forEach(b=>b.classList.toggle('sel',b.textContent===c));
  document.getElementById('spOkBtn').disabled=false;
}
function confirmShot(){
  if(!pendingPos||!selectedClub) return;
  const h=hole(); if(!h) return;
  const key=holeKey();
  if(!roundShots[key]) roundShots[key]=[];
  const shots=roundShots[key];
  const prevIsTee=shots.length===0;
  const prevPos=prevIsTee?{lat:h.tee.lat,lng:h.tee.lng}:{lat:shots[shots.length-1].lat,lng:shots[shots.length-1].lng};
  const carryYd=Math.round(haversine(prevPos.lat,prevPos.lng,pendingPos.lat(),pendingPos.lng())*1.09361);
  const remYd=Math.round(haversine(pendingPos.lat(),pendingPos.lng(),h.center.lat,h.center.lng)*1.09361);
  const no=shots.length+1; // ← 修正済み：pushする前の length+1 が正しい番号
  shots.push({ no, lat:pendingPos.lat(), lng:pendingPos.lng(),
    club:selectedClub, carry:carryYd, remaining:remYd,
    fromLabel:prevIsTee?'ティー':`${shots.length}打目地点` });
  saveRound(); cancelShot(); renderShotLayer(); renderStrip(); updateInfo(); updateRecBanner();
}
function cancelShot(){
  pendingPos=null; selectedClub=null;
  clearPending();
  document.getElementById('shotPanel').classList.remove('open');
  updateRecBanner();
}

// ============================================================
// カップインパネル
// ============================================================
function openCupPanel(){
  const h=hole(); if(!h) return;
  const shots=curShots();
  const totalShots=shots.length; // ショット数 = 記録打数（カップインは+1しない）
  const par=h.par;
  const diff=calcScoreDiff(totalShots,par);
  cpSelectedDiff=diff;
  const sd=scoreDef(diff);

  document.getElementById('cpHoleInfo').textContent=`H${h.no} PAR${par}`;
  document.getElementById('cpShots').textContent=totalShots||'—';
  const lbl=document.getElementById('cpScoreLabel');
  lbl.textContent=totalShots?`${sd.name}（${diff>0?'+':''}${diff}）`:'（打数未記録）';
  lbl.className=`cup-score-label ${sd.cls}`;
  lbl.style.background=totalShots?'':'transparent';

  // スコアボタン
  document.getElementById('cpScoreBtns').innerHTML=SCORE_DEFS.map(d=>{
    const label=d.diff===0?'E':d.diff>0?`+${d.diff}`:String(d.diff);
    return `<button class="score-btn ${d.cls} ${d.diff===cpSelectedDiff?'sel':''}"
      onclick="selectCupScore(${d.diff})">${d.name}<br><small>${label}</small></button>`;
  }).join('');

  document.getElementById('cupPanel').classList.add('open');
  document.getElementById('recBanner').style.display='none';
}
function selectCupScore(diff){
  cpSelectedDiff=diff;
  document.querySelectorAll('.score-btn').forEach(b=>{
    const d=parseInt(b.getAttribute('onclick').match(/-?\d+/)[0]);
    b.classList.toggle('sel',d===diff);
  });
}
function confirmCupIn(){
  const h=hole(); if(!h) return;
  const key=holeKey();
  const metaKey=`${key}_meta`;
  if(!roundShots[key]) roundShots[key]=[];
  roundShots[metaKey]={ cupIn:true, scoreDiff:cpSelectedDiff, par:h.par };
  saveRound(); closeCupPanel(); renderStrip(); updateInfo(); updateRecBanner();
  // 次のホールへ自動遷移
  const nextIdx=st.hIdx+1;
  if(course()&&nextIdx<course().holes.length){
    setTimeout(()=>selectHole(nextIdx),400);
  }
}
function closeCupPanel(){
  document.getElementById('cupPanel').classList.remove('open');
  updateRecBanner();
}

// ============================================================
// 保存済みショット描画
// ============================================================
function makeShotIcon(s){
  const label=`${s.carry}yd→${s.remaining}yd`;
  const w=Math.max(84,label.length*7+12);
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="52">
    <circle cx="${w/2}" cy="14" r="12" fill="#0d1e0d" stroke="#4caf50" stroke-width="2.5"/>
    <text x="${w/2}" y="19" text-anchor="middle" fill="#4caf50" font-size="12" font-weight="bold" font-family="Arial,sans-serif">${s.no}</text>
    <rect x="1" y="30" width="${w-2}" height="20" rx="5" fill="rgba(10,22,10,0.9)" stroke="#4caf50" stroke-width="0.8"/>
    <text x="${w/2}" y="44" text-anchor="middle" fill="#e8c84a" font-size="10" font-family="Arial,sans-serif">${label}</text>
  </svg>`;
  return { url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),
    scaledSize:new google.maps.Size(w,52), anchor:new google.maps.Point(w/2,14) };
}
function renderShotLayer(){
  clearShotLayer();
  const shots=curShots(); if(!shots.length) return;
  const h=hole(); if(!h) return;
  document.getElementById('legShot').style.display='flex';
  const path=[{lat:h.tee.lat,lng:h.tee.lng},...shots.map(s=>({lat:s.lat,lng:s.lng}))];
  shotLines.push(new google.maps.Polyline({path,map,strokeColor:'#4caf50',strokeOpacity:.6,strokeWeight:2,
    icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:2.5},offset:'100%',repeat:'70px'}]}));
  shots.forEach(s=>{
    const m=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map,icon:makeShotIcon(s),zIndex:50});
    m.addListener('click',openReview);
    shotMarkers.push(m);
  });
}
function clearShotLayer(){
  shotMarkers.forEach(m=>m.setMap(null)); shotMarkers=[];
  shotLines.forEach(l=>l.setMap(null)); shotLines=[];
  document.getElementById('legShot').style.display='none';
}

// ============================================================
// レビュー
// ============================================================
function toggleReview(){ document.getElementById('reviewPanel').classList.contains('open')?closeReview():openReview(); }
function openReview(){
  const shots=curShots(); const h=hole();
  const metaKey=`${holeKey()}_meta`;
  const meta=roundShots[metaKey]||{};
  let titleHtml=h?`H${h.no} PAR${h.par}　${shots.length}打`:'ショット履歴';
  if(meta.cupIn){
    const sd=scoreDef(meta.scoreDiff);
    titleHtml+=`<span class="rv-score-badge ${sd.cls}" style="background:var(--${sd.cls})">${sd.name}</span>`;
  }
  document.getElementById('rvTitle').innerHTML=titleHtml;
  document.getElementById('rvList').innerHTML=shots.length
    ? shots.map(s=>`
        <div class="rv-shot">
          <div class="rv-no">${s.no}</div>
          <div class="rv-body">
            <div class="rv-club">${s.club}</div>
            <div class="rv-line">
              ${s.fromLabel}から <span class="hi">${s.carry}yd</span> 飛んで
              センターピンまで <span class="hi y">${s.remaining}yd</span> 残り
            </div>
          </div>
          <button class="rv-del" onclick="deleteShot(${s.no-1})">✕</button>
        </div>`).join('')
    : '<p style="color:var(--gr);font-size:12px;text-align:center;padding:16px;">ショット未登録</p>';
  document.getElementById('reviewPanel').classList.add('open');
  document.getElementById('reviewOverlay').classList.add('show');
}
function closeReview(){
  document.getElementById('reviewPanel').classList.remove('open');
  document.getElementById('reviewOverlay').classList.remove('show');
}
function deleteShot(idx){
  const key=holeKey(); if(!roundShots[key]) return;
  roundShots[key].splice(idx,1);
  roundShots[key].forEach((s,i)=>{ s.no=i+1; });
  if(!roundShots[key].length) delete roundShots[key];
  saveRound(); renderShotLayer(); renderStrip(); openReview(); updateInfo(); updateRecBanner();
}
function clearHoleShots(){
  const key=holeKey();
  delete roundShots[key]; delete roundShots[`${key}_meta`];
  saveRound(); clearShotLayer(); renderStrip(); closeReview(); updateInfo(); updateRecBanner();
}

// ============================================================
// GPS
// ============================================================
function onGpsBtn(){
  if(appMode==='record'&&gpsActive&&gpsMarker&&map){
    updatePendingPos(gpsMarker.getPosition());
    if(!document.getElementById('shotPanel').classList.contains('open')) openShotPanelUI();
  } else { gpsActive?stopGPS():startGPS(); }
}
function startGPS(){
  if(!navigator.geolocation){alert('GPS非対応');return;}
  gpsActive=true;
  document.getElementById('gpsBtn').classList.add('active');
  gpsWatch=navigator.geolocation.watchPosition(pos=>{
    const ll={lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(!map) return;
    if(!gpsMarker){ gpsMarker=new google.maps.Marker({position:ll,map,title:'現在地',icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#4a9fd4',fillOpacity:.9,strokeColor:'#fff',strokeWeight:2.5}}); }
    else gpsMarker.setPosition(ll);
  },err=>{alert('GPS取得失敗: '+err.message);stopGPS();},{enableHighAccuracy:true,maximumAge:3000});
}
function stopGPS(){
  gpsActive=false;
  document.getElementById('gpsBtn').classList.remove('active');
  if(gpsWatch){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}
  if(gpsMarker){gpsMarker.setMap(null);gpsMarker=null;}
}

// ============================================================
// 履歴パネル（スコアサマリーつき）
// ============================================================
function openHistory(){
  const all=JSON.parse(localStorage.getItem('golfRounds')||'[]');
  document.getElementById('histList').innerHTML=all.length
    ? all.map(r=>{
        const hc=Object.keys(r.shots).filter(k=>!k.includes('_meta')).length;
        const sc=Object.entries(r.shots).filter(([k])=>!k.includes('_meta')).reduce((a,[,v])=>a+v.length,0);
        // スコアグリッド（9ホール分）
        let totalDiff=0, completedHoles=0;
        const cells=Array.from({length:9},(_,i)=>{
          const parts=Object.keys(r.shots).filter(k=>!k.includes('_meta'))[0]?.split('_')||[];
          const gcIdx=parts[0], cIdx=parts[1];
          const metaKey=`${gcIdx}_${cIdx}_${i}_meta`;
          const meta=r.shots[metaKey]||{};
          if(meta.cupIn){ totalDiff+=meta.scoreDiff||0; completedHoles++; }
          const sd=meta.cupIn?scoreDef(meta.scoreDiff):null;
          const label=sd?(meta.scoreDiff===0?'E':meta.scoreDiff>0?`+${meta.scoreDiff}`:String(meta.scoreDiff)):'—';
          return `<div class="hr-score-cell" style="${sd?`background:var(--${sd.cls});color:#fff`:''}">
            <div class="hn">${i+1}</div>
            <div class="sv">${label}</div>
          </div>`;
        }).join('');
        const totalLabel=completedHoles>0?(totalDiff===0?'Even':totalDiff>0?`+${totalDiff}`:String(totalDiff)):'—';
        return `<div class="hist-round" onclick="loadRound('${r.id}')">
          <div class="hr-title">${r.gcName} ${r.courseName}</div>
          <div class="hr-sub">${r.date}</div>
          <div class="hr-badges">
            <span class="hr-badge ${hc?'has':''}">${hc}ホール</span>
            <span class="hr-badge ${sc?'has':''}">${sc}打</span>
          </div>
          <div class="hr-score-grid">${cells}</div>
          <div class="hr-total">合計スコア <strong>${totalLabel}</strong></div>
        </div>`;
      }).join('')+`<button class="bb-btn danger" style="width:100%;margin-top:12px;" onclick="clearAllHistory()">すべて削除</button>`
    : '<div class="hist-empty">まだラウンド記録がありません</div>';
  document.getElementById('histPanel').classList.add('open');
}
function closeHistory(){ document.getElementById('histPanel').classList.remove('open'); }
function loadRound(id){
  const all=JSON.parse(localStorage.getItem('golfRounds')||'[]');
  const r=all.find(x=>x.id===id); if(!r) return;
  roundId=r.id; roundShots=r.shots;
  closeHistory(); renderStrip(); renderShotLayer(); updateInfo(); updateRecBanner();
}
function clearAllHistory(){
  if(!confirm('すべての履歴を削除しますか？')) return;
  localStorage.removeItem('golfRounds'); updateBadge(); closeHistory();
}

// ============================================================
// Haversine
// ============================================================
function haversine(la1,lo1,la2,lo2){
  const R=6371000,r=Math.PI/180;
  const dL=(la2-la1)*r,dN=(lo2-lo1)*r;
  const a=Math.sin(dL/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
