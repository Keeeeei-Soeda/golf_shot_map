<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golf Course Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0f1f0f;--g1:#162816;--g2:#1e3a1e;--g3:#2d4f2d;--g4:#3d6b3d;
  --gv:#4caf50;--gvd:#388e3c;--w:#eef4ee;--gr:#7a957a;
  --acc:#e8c84a;--red:#e05252;--blue:#4a9fd4;--pur:#a78bfa;--org:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gd);color:var(--w);display:flex;flex-direction:column;}

/* HEADER */
header{height:52px;flex-shrink:0;background:linear-gradient(135deg,#0a160a,var(--g1));
  border-bottom:2px solid var(--org);display:flex;align-items:center;gap:12px;padding:0 14px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--org);flex-shrink:0;}
.logo small{font-size:10px;color:var(--gr);letter-spacing:1px;margin-left:6px;font-family:'Noto Sans JP',sans-serif;}

/* BODY LAYOUT */
.body-wrap{flex:1;display:flex;overflow:hidden;}

/* LEFT PANEL */
#leftPanel{
  width:320px;flex-shrink:0;background:var(--g1);
  border-right:1px solid var(--g3);
  display:flex;flex-direction:column;overflow:hidden;
}

/* ゴルフ場情報 */
.gc-info{padding:12px;border-bottom:1px solid var(--g3);}
.gc-info label{font-size:10px;color:var(--gr);letter-spacing:1px;display:block;margin-bottom:4px;}
.gc-info input,.gc-info select{
  width:100%;background:rgba(255,255,255,.07);border:1px solid var(--g4);
  border-radius:6px;color:var(--w);padding:7px 10px;font-size:12px;
  font-family:inherit;outline:none;margin-bottom:8px;
}
.gc-info input:focus,.gc-info select:focus{border-color:var(--org);}
.gc-info input::placeholder{color:var(--gr);}
.gc-info select option{background:#1e3a1e;}
.gc-row{display:flex;gap:8px;}
.gc-row .gc-info-field{flex:1;}

/* ホール選択タブ */
#holeTabWrap{
  display:flex;gap:4px;padding:8px;flex-wrap:wrap;
  background:var(--g2);border-bottom:1px solid var(--g3);flex-shrink:0;
}
.hole-tab{
  padding:4px 8px;border-radius:5px;border:1px solid var(--g4);
  background:var(--g3);color:var(--w);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;position:relative;
}
.hole-tab:hover{border-color:var(--org);}
.hole-tab.active{background:var(--org);border-color:var(--org);color:#000;}
.hole-tab .done-dot{
  position:absolute;top:-3px;right:-3px;width:7px;height:7px;
  border-radius:50%;background:var(--gv);border:1px solid var(--gd);display:none;
}
.hole-tab.done .done-dot{display:block;}

/* ポイント選択 */
#pointArea{flex:1;overflow-y:auto;padding:12px;}
.point-title{font-size:11px;color:var(--gr);letter-spacing:1px;margin-bottom:8px;}
.point-btn-wrap{display:flex;flex-direction:column;gap:6px;}
.point-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;border:2px solid var(--g4);
  background:var(--g3);cursor:pointer;transition:all .15s;
}
.point-btn:hover{border-color:var(--org);}
.point-btn.active{border-color:var(--org);background:rgba(245,158,11,.1);}
.point-btn.set{border-color:var(--gv);background:rgba(76,175,80,.08);}
.point-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid #fff;}
.point-label{flex:1;}
.point-label .name{font-size:13px;font-weight:700;}
.point-label .coords{font-size:10px;color:var(--gr);margin-top:2px;font-family:monospace;}
.point-label .coords.set{color:var(--gv);}
.point-check{color:var(--gv);font-size:16px;flex-shrink:0;opacity:0;transition:opacity .15s;}
.point-btn.set .point-check{opacity:1;}
.point-btn.active .point-label .name{color:var(--org);}

/* par入力 */
.par-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;
  background:var(--g2);border-radius:8px;padding:8px 12px;}
.par-row label{font-size:12px;color:var(--gr);flex:1;}
.par-btns{display:flex;gap:4px;}
.par-btn{
  width:32px;height:32px;border-radius:6px;border:1px solid var(--g4);
  background:var(--g3);color:var(--w);font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.par-btn:hover{background:var(--g4);}
.par-btn.active{background:var(--gv);border-color:var(--gv);color:#fff;}

/* ナビボタン */
.nav-row{display:flex;gap:6px;margin-top:12px;}
.nav-btn{
  flex:1;padding:9px;border-radius:8px;border:1px solid var(--g4);
  background:var(--g3);color:var(--w);font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.nav-btn:hover{background:var(--g4);}
.nav-btn.next{background:var(--org);border-color:var(--org);color:#000;}
.nav-btn.next:hover{background:#d97706;}

/* 出力エリア */
#outputArea{
  padding:12px;border-top:1px solid var(--g3);flex-shrink:0;
}
.output-title{font-size:10px;color:var(--gr);letter-spacing:1px;margin-bottom:6px;
  display:flex;align-items:center;justify-content:space-between;}
.output-title .progress{color:var(--gv);font-weight:700;}
#outputBox{
  background:var(--gd);border:1px solid var(--g4);border-radius:6px;
  padding:8px 10px;font-size:10px;font-family:monospace;color:var(--gv);
  height:80px;overflow-y:auto;line-height:1.6;margin-bottom:8px;white-space:pre;
}
.copy-btn{
  width:100%;padding:10px;border-radius:8px;background:var(--gv);border:none;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.copy-btn:hover{background:var(--gvd);}
.copy-btn:disabled{background:var(--g3);color:var(--gr);cursor:default;}
.copy-btn.copied{background:var(--blue);}

/* MAP */
#map{flex:1;}

/* 現在選択中のインジケーター */
#indicator{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(245,158,11,.95);border-radius:20px;
  padding:7px 18px;font-size:13px;font-weight:700;color:#000;
  pointer-events:none;z-index:5;display:none;white-space:nowrap;
}

/* マップラッパー */
#mapWrap{flex:1;position:relative;}
</style>
</head>
<body>

<header>
  <div class="logo">⛳ PICKER<small>座標登録ツール</small></div>
</header>

<div class="body-wrap">

  <!-- 左パネル -->
  <div id="leftPanel">

    <!-- ゴルフ場情報 -->
    <div class="gc-info">
      <div class="gc-row">
        <div class="gc-info-field">
          <label>ゴルフ場名</label>
          <input type="text" id="gcName" placeholder="ローズゴルフクラブ" oninput="updateOutput()"/>
        </div>
        <div class="gc-info-field">
          <label>都道府県</label>
          <input type="text" id="gcPref" placeholder="滋賀県" oninput="updateOutput()"/>
        </div>
      </div>
      <div class="gc-row">
        <div class="gc-info-field">
          <label>ShotNavi GCID</label>
          <input type="number" id="gcId" placeholder="970" oninput="updateOutput()"/>
        </div>
        <div class="gc-info-field">
          <label>コース名</label>
          <input type="text" id="courseName" placeholder="アウト" oninput="updateOutput()"/>
        </div>
      </div>
      <div class="gc-row">
        <div class="gc-info-field">
          <label>ShotNavi CID</label>
          <input type="number" id="courseId" placeholder="1312" oninput="updateOutput()"/>
        </div>
      </div>
    </div>

    <!-- ホールタブ -->
    <div id="holeTabWrap"></div>

    <!-- ポイント選択 -->
    <div id="pointArea">
      <div class="par-row">
        <label>PAR</label>
        <div class="par-btns">
          <button class="par-btn" onclick="setPar(3)">3</button>
          <button class="par-btn active" onclick="setPar(4)">4</button>
          <button class="par-btn" onclick="setPar(5)">5</button>
        </div>
      </div>
      <div class="point-title">📍 登録する地点を選んで地図をクリック</div>
      <div class="point-btn-wrap" id="pointBtns"></div>
      <div class="nav-row">
        <button class="nav-btn" onclick="prevHole()">◀ 前のH</button>
        <button class="nav-btn next" onclick="nextHole()">次のH ▶</button>
      </div>
    </div>

    <!-- 出力エリア -->
    <div id="outputArea">
      <div class="output-title">
        <span>courses.js 出力</span>
        <span class="progress" id="progressLabel">0/9 ホール</span>
      </div>
      <div id="outputBox">← 地図をクリックして座標を入力してください</div>
      <button class="copy-btn" id="copyBtn" onclick="copyOutput()" disabled>
        📋 courses.js 形式でコピー
      </button>
    </div>
  </div>

  <!-- マップ -->
  <div id="mapWrap">
    <div id="map"></div>
    <div id="indicator"></div>
  </div>
</div>

<script>
// ============================================================
// データ構造
// ============================================================
const POINT_DEFS = [
  { key:'tee',    label:'ティー',       color:'#4a9fd4', letter:'T' },
  { key:'front',  label:'フロント (F)', color:'#e05252', letter:'F' },
  { key:'center', label:'センター (C)', color:'#a78bfa', letter:'C' },
  { key:'back',   label:'バック (B)',   color:'#e8c84a', letter:'B' },
];

// 9ホール分のデータ
const holeData = Array.from({ length: 9 }, (_, i) => ({
  no: i + 1, par: 4,
  tee: null, front: null, center: null, back: null,
}));

let currentHole   = 0;         // 現在選択中のホールindex
let currentPoint  = 'tee';     // 現在選択中の地点key
let map           = null;
let placedMarkers = {};        // { `${holeIdx}_${key}`: Marker }

// ============================================================
// 初期化
// ============================================================
function init() {
  renderHoleTabs();
  renderPointBtns();
  updateOutput();
}

// ============================================================
// ホールタブ描画
// ============================================================
function renderHoleTabs() {
  const wrap = document.getElementById('holeTabWrap');
  wrap.innerHTML = holeData.map((h, i) => {
    const done = isDone(i);
    return `<button class="hole-tab ${i === currentHole ? 'active' : ''} ${done ? 'done' : ''}"
      onclick="selectHole(${i})">
      H${h.no}<div class="done-dot"></div>
    </button>`;
  }).join('');
}

function isDone(i) {
  const h = holeData[i];
  return h.tee && h.front && h.center && h.back;
}

function selectHole(i) {
  currentHole = i;
  currentPoint = 'tee'; // ホール切替時はティーからリセット
  renderHoleTabs();
  renderPointBtns();
  updateParBtns();
  updateIndicator();
  // 地図をそのホールの既存マーカーに合わせてパン
  const h = holeData[i];
  if (map && h.tee) map.panTo({ lat: h.tee.lat, lng: h.tee.lng });
}

function prevHole() { if (currentHole > 0) selectHole(currentHole - 1); }
function nextHole() { if (currentHole < 8) selectHole(currentHole + 1); }

// ============================================================
// 地点ボタン描画
// ============================================================
function renderPointBtns() {
  const h = holeData[currentHole];
  document.getElementById('pointBtns').innerHTML = POINT_DEFS.map(p => {
    const val  = h[p.key];
    const isActive = currentPoint === p.key;
    const isSet    = !!val;
    const coords   = val ? `${val.lat.toFixed(6)}, ${val.lng.toFixed(6)}` : '未登録';
    return `<div class="point-btn ${isActive ? 'active' : ''} ${isSet ? 'set' : ''}"
      onclick="selectPoint('${p.key}')">
      <div class="point-dot" style="background:${p.color}"></div>
      <div class="point-label">
        <div class="name">${p.label}</div>
        <div class="coords ${isSet ? 'set' : ''}">${coords}</div>
      </div>
      <div class="point-check">✓</div>
    </div>`;
  }).join('');
}

function selectPoint(key) {
  currentPoint = key;
  renderPointBtns();
  updateIndicator();
}

// ============================================================
// PAR ボタン
// ============================================================
function setPar(p) {
  holeData[currentHole].par = p;
  updateParBtns();
  updateOutput();
}

function updateParBtns() {
  const par = holeData[currentHole].par;
  document.querySelectorAll('.par-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === par);
  });
}

// ============================================================
// インジケーター（地図上のバナー）
// ============================================================
function updateIndicator() {
  const indicator = document.getElementById('indicator');
  const h  = holeData[currentHole];
  const pd = POINT_DEFS.find(p => p.key === currentPoint);
  indicator.textContent = `H${h.no} — ${pd.label} をクリックして登録`;
  indicator.style.display = 'block';
}

// ============================================================
// Google Maps 初期化
// ============================================================
window.initMap = function () {
  map = new google.maps.Map(document.getElementById('map'), {
    center:    { lat: 34.8924, lng: 136.0501 },
    zoom:      17,
    mapTypeId: 'satellite',
    tilt:      0,
    disableDefaultUI: true,
    zoomControl: true,
    gestureHandling: 'greedy',
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
  });
  map.addListener('click', onMapClick);
  updateIndicator();
};

// ============================================================
// 地図クリック → 座標登録
// ============================================================
function onMapClick(e) {
  const lat = e.latLng.lat();
  const lng = e.latLng.lng();
  const h   = holeData[currentHole];

  // データに保存
  h[currentPoint] = { lat: parseFloat(lat.toFixed(6)), lng: parseFloat(lng.toFixed(6)) };

  // マーカー更新
  placeMarker(currentHole, currentPoint, e.latLng);

  // 次の地点へ自動移動
  const keys   = POINT_DEFS.map(p => p.key);
  const curIdx = keys.indexOf(currentPoint);
  if (curIdx < keys.length - 1) {
    currentPoint = keys[curIdx + 1];
  }
  // 全4点完了なら次のホールへ
  else if (isDone(currentHole) && currentHole < 8) {
    setTimeout(() => selectHole(currentHole + 1), 300);
    return;
  }

  renderPointBtns();
  renderHoleTabs();
  updateIndicator();
  updateOutput();
}

// ============================================================
// マーカー配置
// ============================================================
function placeMarker(hIdx, key, latlng) {
  const mk = `${hIdx}_${key}`;
  if (placedMarkers[mk]) placedMarkers[mk].setMap(null);
  const pd = POINT_DEFS.find(p => p.key === key);
  const h  = holeData[hIdx];
  placedMarkers[mk] = new google.maps.Marker({
    position: latlng, map,
    icon: {
      path:        google.maps.SymbolPath.CIRCLE,
      scale:       10,
      fillColor:   pd.color,
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 2,
    },
    label: { text: pd.letter, color: '#fff', fontSize: '11px', fontWeight: 'bold' },
    title: `H${h.no} ${pd.label}`,
    zIndex: 50,
  });

  // クリックで再選択
  placedMarkers[mk].addListener('click', () => {
    currentHole  = hIdx;
    currentPoint = key;
    renderHoleTabs();
    renderPointBtns();
    updateParBtns();
    updateIndicator();
  });
}

// ============================================================
// courses.js 形式で出力
// ============================================================
function fmtCoord(val) {
  if (!val) return 'null';
  return `{ lat: ${val.lat}, lng: ${val.lng} }`;
}

function updateOutput() {
  const name   = document.getElementById('gcName').value     || 'ゴルフ場名';
  const pref   = document.getElementById('gcPref').value     || '○○県';
  const gcid   = document.getElementById('gcId').value       || 'XXXX';
  const cname  = document.getElementById('courseName').value || 'アウト';
  const cid    = document.getElementById('courseId').value   || 'XXXX';

  // 中心座標（登録済みティーの平均）
  const tees = holeData.filter(h => h.tee).map(h => h.tee);
  const centerLat = tees.length ? (tees.reduce((a, t) => a + t.lat, 0) / tees.length).toFixed(4) : 'XX.XXXX';
  const centerLng = tees.length ? (tees.reduce((a, t) => a + t.lng, 0) / tees.length).toFixed(4) : 'XXX.XXXX';

  const holesStr = holeData.map(h => {
    if (!h.tee && !h.front && !h.center && !h.back) {
      return `          { no:${h.no}, par:${h.par}, tee:null, front:null, center:null, back:null },`;
    }
    return `          {
            no:${h.no}, par:${h.par},
            tee:    ${fmtCoord(h.tee)},
            front:  ${fmtCoord(h.front)},
            center: ${fmtCoord(h.center)},
            back:   ${fmtCoord(h.back)},
          },`;
  }).join('\n');

  const output = `  {
    name: '${name}',
    pref: '${pref}',
    gcid: ${gcid},
    lat:  ${centerLat},
    lng:  ${centerLng},
    courses: [
      {
        name: '${cname}',
        cid:  ${cid},
        holes: [
${holesStr}
        ],
      },
    ],
  },`;

  document.getElementById('outputBox').textContent = output;

  // 進捗
  const done = holeData.filter((_, i) => isDone(i)).length;
  document.getElementById('progressLabel').textContent = `${done}/9 ホール`;
  document.getElementById('copyBtn').disabled = done === 0;
}

// ============================================================
// コピー
// ============================================================
function copyOutput() {
  const text = document.getElementById('outputBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ コピーしました！courses.js に貼り付けてください';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 courses.js 形式でコピー';
      btn.classList.remove('copied');
    }, 3000);
  });
}

init();
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCWJ1tClOaETblGP4m0ndFbpPt4JyKN1pg&callback=initMap&language=ja">
</script>
</body>
</html>
