<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⛳ Golf AI Architect</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0f1f0f;--g1:#162816;--g2:#1e3a1e;--g3:#2d4f2d;--g4:#3d6b3d;
  --gv:#4caf50;--gvd:#388e3c;--w:#eef4ee;--gr:#7a957a;
  --acc:#e8c84a;--red:#e05252;--blue:#4a9fd4;--pur:#a78bfa;--org:#f59e0b;
  --sidebar-w:260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gd);color:var(--w);display:flex;}

/* ===== OVERLAY (mobile) ===== */
#overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);}

/* ===== SIDEBAR ===== */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--g1);
  border-right:2px solid var(--g3);display:flex;flex-direction:column;
  height:100vh;transition:transform .28s ease;z-index:60;
}
.sb-header{padding:14px 12px 10px;border-bottom:1px solid var(--g3);flex-shrink:0;}
.sb-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--acc);margin-bottom:10px;}
.sb-logo small{font-size:10px;color:var(--gr);letter-spacing:1px;margin-left:6px;font-family:'Noto Sans JP',sans-serif;}
.new-chat-btn{
  width:100%;padding:10px;border-radius:8px;border:1px dashed var(--gv);
  background:transparent;color:var(--gv);font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.new-chat-btn:hover{background:rgba(76,175,80,.15);}
.chat-list{flex:1;overflow-y:auto;padding:8px 6px;}
.chat-item{
  display:flex;align-items:center;gap:6px;padding:9px 10px;
  border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px;
}
.chat-item:hover{background:var(--g2);}
.chat-item.active{background:var(--g3);}
.chat-item-title{flex:1;font-size:12px;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-item-del{
  background:none;border:none;color:var(--gr);cursor:pointer;
  font-size:13px;opacity:0;transition:opacity .15s;padding:2px 5px;border-radius:4px;
}
.chat-item:hover .chat-item-del{opacity:1;}
.chat-item-del:hover{color:var(--red);background:rgba(224,82,82,.1);}
.sb-footer{padding:10px;border-top:1px solid var(--g3);display:flex;gap:6px;flex-shrink:0;}
.sb-footer-btn{
  flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--g4);
  background:var(--g3);color:var(--w);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.sb-footer-btn:hover{background:var(--g4);}

/* ===== MAIN ===== */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.main-header{
  height:48px;flex-shrink:0;background:linear-gradient(135deg,#0a160a,var(--g1));
  border-bottom:2px solid var(--gv);display:none;align-items:center;gap:10px;padding:0 12px;
}
.hbg-btn{background:none;border:none;color:var(--w);font-size:22px;cursor:pointer;padding:4px;}
.main-title{font-size:14px;font-weight:700;color:var(--acc);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}

/* ===== MESSAGES ===== */
#messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;}

/* welcome */
#welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:32px 20px;text-align:center;gap:12px;
}
.wl-icon{font-size:52px;}
.wl-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--acc);}
.wl-sub{font-size:13px;color:var(--gr);line-height:1.9;max-width:400px;}
.wl-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px;}
.wl-chip{
  padding:8px 14px;border-radius:20px;border:1px solid var(--g4);
  background:var(--g2);color:var(--w);font-size:12px;cursor:pointer;transition:all .15s;
}
.wl-chip:hover{border-color:var(--gv);color:var(--gv);}

/* bubbles */
.msg-wrap{display:flex;gap:10px;align-items:flex-start;}
.msg-wrap.user{flex-direction:row-reverse;}
.msg-avatar{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;background:var(--g3);margin-top:2px;
}
.msg-wrap.user .msg-avatar{background:var(--gv);color:#000;}
.msg-bubble{
  max-width:74%;padding:11px 15px;border-radius:16px;
  font-size:14px;line-height:1.75;word-break:break-word;
}
.msg-wrap.user .msg-bubble{
  background:var(--gv);color:#000;font-weight:500;border-radius:16px 16px 4px 16px;
}
.msg-wrap.ai .msg-bubble{
  background:var(--g2);color:var(--w);border:1px solid var(--g3);border-radius:16px 16px 16px 4px;
}
.msg-bubble strong{font-weight:700;color:var(--acc);}
.msg-bubble em{font-style:italic;color:var(--gr);}
.msg-bubble code{
  background:var(--g3);padding:1px 6px;border-radius:4px;
  font-family:monospace;font-size:12px;color:var(--gv);
}
.msg-bubble .md-list{margin:6px 0 6px 16px;}
.msg-bubble .md-list li{margin-bottom:3px;}
.typing-cursor::after{content:'▊';animation:blink .7s infinite;color:var(--gv);font-size:12px;}
@keyframes blink{50%{opacity:0}}

/* ===== INPUT AREA ===== */
.input-area{
  flex-shrink:0;padding:12px 16px;background:var(--g1);
  border-top:1px solid var(--g3);display:flex;gap:10px;align-items:flex-end;
}
#userInput{
  flex:1;background:var(--g2);border:1px solid var(--g4);border-radius:12px;
  color:var(--w);padding:11px 14px;font-size:14px;font-family:inherit;
  resize:none;max-height:140px;line-height:1.6;outline:none;overflow-y:auto;
}
#userInput:focus{border-color:var(--gv);}
#userInput::placeholder{color:var(--gr);}
#sendBtn{
  height:44px;padding:0 20px;border-radius:12px;background:var(--gv);
  color:#000;font-size:14px;font-weight:700;border:none;cursor:pointer;
  font-family:inherit;transition:all .15s;flex-shrink:0;
}
#sendBtn:disabled{background:var(--g3);color:var(--gr);cursor:default;}
#sendBtn:not(:disabled):hover{background:var(--gvd);}

/* ===== API KEY MODAL ===== */
#apiKeyModal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);align-items:center;justify-content:center;
}
.modal-box{
  background:var(--g2);border:1px solid var(--g4);border-radius:16px;
  padding:24px;width:min(440px,92vw);
}
.modal-box h3{font-size:16px;color:var(--acc);margin-bottom:10px;}
.modal-box p{font-size:12px;color:var(--gr);line-height:1.8;margin-bottom:14px;}
.modal-box a{color:var(--blue);}
.modal-box input{
  width:100%;background:var(--g3);border:1px solid var(--g4);border-radius:8px;
  color:var(--w);padding:10px 12px;font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;
}
.modal-box input:focus{border-color:var(--gv);}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{
  flex:1;padding:10px;border-radius:8px;font-weight:700;font-family:inherit;cursor:pointer;font-size:13px;
}
.btn-save{background:var(--gv);border:none;color:#000;}
.btn-cancel{background:var(--g3);border:1px solid var(--g4);color:var(--w);}

/* ===== MOBILE ===== */
@media(max-width:680px){
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:60;
    transform:translateX(-100%);
  }
  #sidebar.open{transform:translateX(0);}
  .main-header{display:flex;}
}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar">
  <div class="sb-header">
    <div class="sb-logo">⛳ Golf AI<small>Architect</small></div>
    <button class="new-chat-btn" onclick="newChat()">＋ 新しいチャット</button>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sb-footer">
    <button class="sb-footer-btn" onclick="window.location.href='index.html'">← アプリへ</button>
    <button class="sb-footer-btn" onclick="openApiKeyModal()">🔑 APIキー</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div id="main">
  <div class="main-header">
    <button class="hbg-btn" onclick="toggleSidebar()">☰</button>
    <span class="main-title" id="mobileTitle">⛳ Golf AI Architect</span>
  </div>
  <div id="messages"></div>
  <div class="input-area">
    <textarea id="userInput" placeholder="ゴルフについて何でも聞いてください…" rows="1"
      onkeydown="onKeyDown(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">送信</button>
  </div>
</div>

<!-- ===== API KEY MODAL ===== -->
<div id="apiKeyModal">
  <div class="modal-box">
    <h3>🔑 OpenAI APIキー設定</h3>
    <p>
      ChatGPT API（GPT-4o）を利用するにはAPIキーが必要です。<br>
      キーはこのデバイスのブラウザにのみ保存されます。<br>
      <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a> で発行できます。
    </p>
    <input type="password" id="apiKeyInput" placeholder="sk-proj-…"/>
    <div class="modal-btns">
      <button class="btn-save" onclick="saveApiKey()">保存して開始</button>
      <button class="btn-cancel" onclick="closeApiKeyModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 定数・設定
// ============================================================
const CHATS_KEY   = 'golfAiChats';
const APIKEY_KEY  = 'openaiApiKey';
const MODEL       = 'gpt-4o';
const MAX_HISTORY = 40; // 直近の会話数（トークン節約）

// ============================================================
// システムプロンプト（Golf System Architect & Debugger）
// ============================================================
const SYSTEM_PROMPT_BASE = `あなたは「Golf System Architect & Debugger」です。ユーザーの「100切り」を最短で達成させるための戦略的キャディかつデータサイエンティストとして振る舞ってください。

■ 性格・スタンス
- 冷静沈着（Stoic）: ミスショットをしても動揺せず、淡々と次の「リカバリー最適解」を提示する。感情的な励ましよりも論理的なデータを示す。
- リスク回避型（Risk-Averse）: OB・池・バンカー・3パットを徹底的に避けることを優先する。
- 期待値重視: 「成功率20%の180ydショット」よりも「成功率80%の100ydショット」を推奨する。

■ 思考アルゴリズム（行動指針）
- 「ボギーはパー」理論: 100切りには「オールボギー（90）」で十分。常に「ボギーオン」を正解とし、無理なパーオン狙いを制止する。
- ハザードのデバッグ: 常に「最もやってはいけないミス（右OBなど）」を特定し、物理的に回避するアドレスと番手を提案する。
- クラブ特性の把握: ユーザーの個別の癖（フック傾向など）とクラブ仕様を計算に入れたマネジメントを行う。
- スイングのデバッグ: ユーザーが「意識」を聞いてきた場合、現在のミス傾向を打ち消す「修正コード（具体的動作）」を提示する。
- ルーチン構築: 練習場での限られた球数の分配を弱点克服と成功体験の維持の両面から提示する。
- ナレッジベースの統合: ユーザーの全ログ（過去ラウンド、クラブ構成、ミス傾向）を仕様書として扱い、矛盾のない回答を行う。

■ 制約（必ず守ること）
- 「一か八か」「気合で」というアドバイスは絶対禁止。
- 常に「全ホールボギーで90」であることをリマインドして100切りを目指させる。
- ゴルフ以外の話題（政治・経済・恋愛など）には「申し訳ありませんが、私はゴルフ専用AIです。ゴルフに関するご質問にお答えします。」とだけ答える。
- 回答は日本語で行う。`;

// ============================================================
// ユーザーデータのコンテキスト生成
// ============================================================
function buildContext() {
  let ctx = '\n\n━━━━━━━━━━ ユーザーデータ ━━━━━━━━━━';

  // クラブセット
  try {
    const clubs = JSON.parse(localStorage.getItem('golfClubSet') || '[]');
    const valid = clubs.filter(c => c && c.trim());
    if (valid.length) ctx += `\n\n▼ クラブセット構成\n${valid.join('、')}`;
  } catch(e) {}

  // 直近ラウンド（最新3件）
  try {
    const rounds = JSON.parse(localStorage.getItem('golfRounds') || '[]');
    if (rounds.length) {
      ctx += '\n\n▼ 直近のラウンドデータ（最新3件）';
      rounds.slice(0, 3).forEach(r => {
        ctx += `\n\n[${r.date}] ${r.gcName} ${r.courseName}`;
        const results = [];
        Object.entries(r.shots).forEach(([key, val]) => {
          if (key.includes('_meta') || !Array.isArray(val)) return;
          const parts = key.split('_');
          if (parts.length < 3) return;
          const hIdx = parseInt(parts[2]);
          const meta = r.shots[key + '_meta'] || {};
          if (!meta.cupIn) return;
          const score = meta.totalShots || val.length;
          const par   = meta.par || '?';
          const diff  = meta.scoreDiff || 0;
          const diffS = diff === 0 ? 'E' : diff > 0 ? `+${diff}` : String(diff);
          // ショット詳細
          const details = val.slice(0, 5).filter(s => !s.isPenalty && s.club)
            .map(s => `${s.no}打:${s.club} ${s.carry}yd`).join(' / ');
          // 評価（フック/スライスなど）
          const evals = val.filter(s => s.result).map(s => `${s.no}打=${s.result}`).join(',');
          results.push(`H${hIdx+1} PAR${par} ${score}打${diffS}${evals ? ` (${evals})` : ''}${details ? ` [${details}]` : ''}`);
        });
        if (results.length) {
          ctx += '\n' + results.join('\n');
          // トータル集計
          let tot = 0, totp = 0;
          Object.values(r.shots).forEach(v => {
            if (v && v.cupIn) { tot += v.totalShots || 0; totp += v.par || 0; }
          });
          if (tot > 0) ctx += `\n合計: ${tot}打 / PAR${totp} (${tot > totp ? '+' : ''}${tot - totp})`;
        }
      });
    }
  } catch(e) {}

  ctx += '\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
  return ctx;
}

function getSystemPrompt() {
  return SYSTEM_PROMPT_BASE + buildContext();
}

// ============================================================
// チャット管理
// ============================================================
let chats = [];
let currentChatId = null;
let isLoading = false;

function loadChats() {
  try { chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '[]'); }
  catch(e) { chats = []; }
}

function saveChats() {
  localStorage.setItem(CHATS_KEY, JSON.stringify(chats.slice(0, 60)));
}

function newChat() {
  const chat = {
    id: 'c' + Date.now(),
    title: '新しいチャット',
    createdAt: Date.now(),
    updatedAt: Date.now(),
    messages: []
  };
  chats.unshift(chat);
  saveChats();
  loadChatView(chat.id);
  closeSidebar();
}

function loadChatView(id) {
  currentChatId = id;
  renderChatList();
  renderMessages();
  const chat = getChat();
  document.getElementById('mobileTitle').textContent = chat ? chat.title : 'Golf AI';
}

function getChat() { return chats.find(c => c.id === currentChatId); }

function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm('このチャットを削除しますか？')) return;
  chats = chats.filter(c => c.id !== id);
  saveChats();
  if (currentChatId === id) { currentChatId = null; renderMessages(); }
  renderChatList();
}

// ============================================================
// レンダリング
// ============================================================
function renderChatList() {
  const el = document.getElementById('chatList');
  if (!chats.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gr);font-size:12px;">チャットがありません</div>';
    return;
  }
  el.innerHTML = chats.map(c => `
    <div class="chat-item${c.id === currentChatId ? ' active' : ''}" onclick="loadChatView('${c.id}');closeSidebar()">
      <div class="chat-item-title">💬 ${esc(c.title)}</div>
      <button class="chat-item-del" onclick="deleteChat('${c.id}',event)" title="削除">✕</button>
    </div>`).join('');
}

function renderMessages() {
  const el = document.getElementById('messages');
  const chat = getChat();
  if (!chat || !chat.messages.length) {
    el.innerHTML = `
      <div id="welcome">
        <div class="wl-icon">⛳</div>
        <div class="wl-title">Golf System Architect</div>
        <div class="wl-sub">
          あなた専属のゴルフ戦略AIです。<br>
          過去のラウンドデータとクラブセットを参照し、<br>
          最適な100切り戦略をアドバイスします。
        </div>
        <div class="wl-chips">
          <div class="wl-chip" onclick="quickQ('今週のラウンドを振り返って課題を教えて')">📊 ラウンド振り返り</div>
          <div class="wl-chip" onclick="quickQ('ドライバーの意識、今はどんな感じがいい？')">🏌️ ドライバー相談</div>
          <div class="wl-chip" onclick="quickQ('残り150yd、何番アイアンが安全？')">📐 番手選択相談</div>
          <div class="wl-chip" onclick="quickQ('今日の練習メニューを組んでください')">🎯 練習メニュー</div>
          <div class="wl-chip" onclick="quickQ('100切りのための優先課題を教えて')">🏆 100切り戦略</div>
        </div>
      </div>`;
    return;
  }
  el.innerHTML = chat.messages.map(m => bubbleHtml(m)).join('');
  scrollBottom();
}

function bubbleHtml(msg) {
  const isUser = msg.role === 'user';
  return `
    <div class="msg-wrap ${isUser ? 'user' : 'ai'}">
      <div class="msg-avatar">${isUser ? '👤' : '⛳'}</div>
      <div class="msg-bubble">${isUser ? esc(msg.content) : renderMd(msg.content)}</div>
    </div>`;
}

// Streaming 中の一時バブルを追加して ID を返す
function addStreamBubble() {
  const el = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const id = 'b' + Date.now();
  el.insertAdjacentHTML('beforeend', `
    <div class="msg-wrap ai" id="${id}">
      <div class="msg-avatar">⛳</div>
      <div class="msg-bubble typing-cursor"></div>
    </div>`);
  scrollBottom();
  return id;
}

function updateStreamBubble(id, text, done) {
  const wrap = document.getElementById(id);
  if (!wrap) return;
  const bubble = wrap.querySelector('.msg-bubble');
  bubble.innerHTML = renderMd(text);
  if (done) bubble.classList.remove('typing-cursor');
  scrollBottom();
}

function addUserBubble(text) {
  const el = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  el.insertAdjacentHTML('beforeend', `
    <div class="msg-wrap user">
      <div class="msg-avatar">👤</div>
      <div class="msg-bubble">${esc(text)}</div>
    </div>`);
  scrollBottom();
}

// ============================================================
// Claude API 呼び出し（ストリーミング）
// ============================================================
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  const apiKey = localStorage.getItem(APIKEY_KEY);
  if (!apiKey) { openApiKeyModal(); return; }

  if (!currentChatId) newChat();
  const chat = getChat();

  // ユーザーメッセージ保存
  chat.messages.push({ role: 'user', content: text });
  if (chat.title === '新しいチャット') chat.title = text.slice(0, 26) + (text.length > 26 ? '…' : '');
  chat.updatedAt = Date.now();
  saveChats();
  renderChatList();

  input.value = '';
  autoResize(input);
  addUserBubble(text);
  const bubId = addStreamBubble();
  setLoading(true);

  let aiText = '';
  try {
    // APIに渡すメッセージ（直近 MAX_HISTORY 件）
    const apiMsgs = chat.messages.slice(-MAX_HISTORY).map(m => ({ role: m.role, content: m.content }));

    // OpenAI Chat Completions API（ストリーミング）
    const openaiMsgs = [
      { role: 'system', content: getSystemPrompt() },
      ...apiMsgs
    ];

    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 2048,
        stream: true,
        messages: openaiMsgs
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    // SSE ストリーミング読み取り（OpenAI形式）
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw || raw === '[DONE]') continue;
        try {
          const ev = JSON.parse(raw);
          const delta = ev.choices?.[0]?.delta?.content;
          if (delta) {
            aiText += delta;
            updateStreamBubble(bubId, aiText, false);
          }
        } catch(e) {}
      }
    }

    updateStreamBubble(bubId, aiText, true);
    chat.messages.push({ role: 'assistant', content: aiText });
    saveChats();
    renderChatList();

  } catch(err) {
    const msg = `⚠️ エラーが発生しました\n\n${err.message}\n\nAPIキーをご確認ください。`;
    updateStreamBubble(bubId, msg, true);
    chat.messages.pop(); // ユーザーメッセージを戻す
    saveChats();
  }

  setLoading(false);
}

function quickQ(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

// ============================================================
// UI ヘルパー
// ============================================================
function setLoading(v) {
  isLoading = v;
  const btn = document.getElementById('sendBtn');
  btn.disabled = v;
  btn.textContent = v ? '…' : '送信';
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// マークダウン → HTML（XSS安全）
function renderMd(text) {
  let s = esc(text);
  // **太字**
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // *斜体*
  s = s.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // `コード`
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // --- 区切り
  s = s.replace(/^---$/gm, '<hr style="border-color:var(--g3);margin:8px 0">');
  // 箇条書き (- item)
  s = s.replace(/((?:^- .+\n?)+)/gm, (m) => {
    const items = m.trim().split('\n').map(l => `<li>${l.slice(2)}</li>`).join('');
    return `<ul class="md-list">${items}</ul>`;
  });
  // 番号付きリスト (1. item)
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm, (m) => {
    const items = m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
    return `<ol class="md-list">${items}</ol>`;
  });
  // 改行
  s = s.replace(/\n/g, '<br>');
  return s;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// サイドバー（モバイル）
// ============================================================
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const open = sb.classList.toggle('open');
  ov.style.display = open ? 'block' : 'none';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').style.display = 'none';
}

// ============================================================
// APIキーモーダル
// ============================================================
function openApiKeyModal() {
  document.getElementById('apiKeyInput').value = localStorage.getItem(APIKEY_KEY) || '';
  document.getElementById('apiKeyModal').style.display = 'flex';
}
function closeApiKeyModal() {
  document.getElementById('apiKeyModal').style.display = 'none';
}
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) localStorage.setItem(APIKEY_KEY, key);
  closeApiKeyModal();
}

// ============================================================
// 初期化
// ============================================================
function init() {
  loadChats();
  renderChatList();
  renderMessages();
  if (!localStorage.getItem(APIKEY_KEY)) openApiKeyModal();
}
init();
</script>
