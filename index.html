<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>My Golf Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --gd: #0f1f0f;
    --g1: #162816;
    --g2: #1e3a1e;
    --g3: #2d4f2d;
    --g4: #3d6b3d;
    --gv: #4caf50;
    --w:  #eef4ee;
    --gr: #7a957a;
    --acc:#e8c84a;
    --red:#e05252;
    --blue:#4a9fd4;
    --center:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--gd);color:var(--w);display:flex;flex-direction:column;}

  header{
    height:52px;flex-shrink:0;
    background:linear-gradient(135deg,#0a160a,var(--g1));
    border-bottom:2px solid var(--gv);
    display:flex;align-items:center;gap:10px;padding:0 12px;
    position:relative;z-index:20;
  }
  .logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--acc);flex-shrink:0;line-height:1;}
  .logo small{display:block;font-size:10px;letter-spacing:2px;color:var(--gv);margin-top:-3px;}

  .selects{display:flex;gap:6px;flex:1;overflow:hidden;}
  .sel-wrap{position:relative;flex:1;min-width:0;}
  .sel-wrap select{
    width:100%;appearance:none;background:rgba(255,255,255,0.07);
    border:1px solid var(--g4);border-radius:6px;color:var(--w);
    padding:6px 26px 6px 9px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;
  }
  .sel-wrap select:focus{border-color:var(--gv);}
  .sel-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--gr);font-size:11px;pointer-events:none;}
  .sel-wrap option{background:#1e3a1e;}

  .gps-btn{
    flex-shrink:0;padding:6px 10px;border-radius:6px;
    background:rgba(74,159,212,0.15);border:1px solid var(--blue);
    color:var(--blue);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .gps-btn:hover{background:rgba(74,159,212,0.3);}
  .gps-btn.active{background:var(--blue);color:#fff;}

  .sn-btn{
    flex-shrink:0;padding:6px 10px;border-radius:6px;
    background:rgba(255,255,255,0.05);border:1px solid var(--g4);
    color:var(--gr);font-size:12px;cursor:pointer;transition:all .2s;
    font-family:inherit;text-decoration:none;display:flex;align-items:center;
  }
  .sn-btn:hover{color:var(--w);background:rgba(255,255,255,0.1);}

  /* ホールストリップ */
  #holeStrip{
    height:58px;flex-shrink:0;background:var(--g1);
    border-bottom:1px solid var(--g3);
    display:flex;align-items:center;gap:6px;padding:0 10px;
    overflow-x:auto;overflow-y:hidden;
  }
  #holeStrip::-webkit-scrollbar{height:3px;}
  #holeStrip::-webkit-scrollbar-thumb{background:var(--g4);}
  .h-btn{
    flex-shrink:0;min-width:46px;padding:4px 6px;
    border-radius:6px;background:var(--g3);border:2px solid transparent;
    color:var(--w);font-size:12px;font-weight:700;cursor:pointer;
    text-align:center;transition:all .15s;font-family:inherit;
  }
  .h-btn:hover{border-color:var(--g4);}
  .h-btn.active{border-color:var(--acc);color:var(--acc);background:var(--g2);}
  .h-btn .par{display:block;font-size:10px;font-weight:400;color:var(--gr);margin-top:1px;}
  .h-btn.active .par{color:var(--acc);opacity:.7;}
  .h-btn.no-data{opacity:0.4;}

  /* 地図 */
  #mapWrap{flex:1;position:relative;display:flex;flex-direction:column;}
  #map{flex:1;width:100%;display:none;}
  #emptyMap{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;color:var(--gr);
  }
  #emptyMap .ico{font-size:48px;}

  /* 凡例 */
  #legend{
    position:absolute;top:8px;left:8px;z-index:10;
    background:rgba(10,22,10,0.88);border:1px solid var(--g4);
    border-radius:8px;padding:8px 12px;backdrop-filter:blur(4px);
    display:none;pointer-events:none;
  }
  .leg-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--w);margin-bottom:4px;}
  .leg-row:last-child{margin-bottom:0;}
  .leg-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;flex-shrink:0;}

  /* 距離パネル */
  #distPanel{
    position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
    background:rgba(10,22,10,0.93);border:1px solid var(--gv);
    border-radius:12px;padding:12px 20px;text-align:center;
    backdrop-filter:blur(8px);min-width:190px;z-index:10;
    display:none;pointer-events:none;
  }
  #distPanel.show{display:block;}
  #distPanel .label{font-size:10px;letter-spacing:2px;color:var(--gr);text-transform:uppercase;margin-bottom:2px;}
  #distPanel .yards{font-family:'Bebas Neue',sans-serif;font-size:50px;color:var(--acc);line-height:1;}
  #distPanel .yards span{font-size:18px;color:var(--gr);margin-left:3px;}
  #distPanel .meters{font-size:11px;color:var(--gr);margin-top:1px;}
  #distPanel .target{font-size:11px;margin-top:4px;}
  #distPanel .target.front{color:var(--red);}
  #distPanel .target.center{color:var(--center);}
  #distPanel .target.back{color:var(--acc);}

  /* ボトムバー */
  #bottomBar{
    height:48px;flex-shrink:0;background:var(--g1);
    border-top:1px solid var(--g3);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 12px;gap:10px;z-index:10;
  }
  .mode-info{font-size:12px;color:var(--gr);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mode-info strong{color:var(--gv);}
  .clear-btn{
    flex-shrink:0;padding:6px 14px;border-radius:6px;background:var(--g3);
    border:1px solid var(--g4);color:var(--w);font-size:12px;
    cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .clear-btn:hover{background:var(--g4);}

  @media(max-width:520px){
    .logo small{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">⛳ GOLF<small>DISTANCE</small></div>
  <div class="selects">
    <div class="sel-wrap">
      <select id="gcSel" onchange="onGCSel()">
        <option value="">-- ゴルフ場 --</option>
      </select>
    </div>
    <div class="sel-wrap">
      <select id="courseSel" onchange="onCourseSel()">
        <option value="">-- コース --</option>
      </select>
    </div>
  </div>
  <button class="gps-btn" id="gpsBtn" onclick="toggleGPS()">📍 GPS</button>
  <a class="sn-btn" id="snLink" href="#" target="_blank">🗺</a>
</header>

<div id="holeStrip"></div>

<div id="mapWrap">
  <div id="emptyMap">
    <div class="ico">⛳</div>
    <p>ゴルフ場・コースを選択してください</p>
  </div>
  <div id="map"></div>

  <!-- 凡例 -->
  <div id="legend">
    <div class="leg-row"><div class="leg-dot" style="background:var(--blue)"></div>ティー</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--red)"></div>フロント (F)</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--center)"></div>センター (C)</div>
    <div class="leg-row"><div class="leg-dot" style="background:var(--acc)"></div>バック (B)</div>
  </div>

  <!-- 距離パネル -->
  <div id="distPanel">
    <div class="label">distance</div>
    <div class="yards" id="yardVal">—<span>yd</span></div>
    <div class="meters" id="meterVal">— m</div>
    <div class="target" id="targetLabel"></div>
  </div>
</div>

<div id="bottomBar">
  <div class="mode-info" id="modeInfo">コースを選択してください</div>
  <button class="clear-btn" onclick="clearMeasure()">リセット</button>
</div>

<script>
// ============================================================
// ★ コースデータ ★
// ============================================================
const COURSES = [
  {
    name: 'ローズゴルフクラブ',
    pref: '滋賀県',
    gcid: 970,
    lat: 34.8924, lng: 136.0535,
    courses: [
      {
        name: 'アウト', cid: 1312,
        holes: [
          {
            no:1, par:5,
            tee:    {lat:34.892567, lng:136.051814},
            front:  {lat:34.892015, lng:136.056338},
            center: {lat:34.892025, lng:136.056534},
            back:   {lat:34.892010, lng:136.056733},
          },
          {
            no:2, par:4,
            tee:    {lat:34.892468, lng:136.057524},
            front:  {lat:34.893836, lng:136.055347},
            center: {lat:34.893976, lng:136.055313},
            back:   {lat:34.894094, lng:136.055283},
          },
          {
            no:3, par:3,
            tee:    {lat:34.894491, lng:136.055709},
            front:  {lat:34.893656, lng:136.056758},
            center: {lat:34.893573, lng:136.056885},
            back:   {lat:34.893475, lng:136.056991},
          },
          {
            no:4, par:4,
            tee:    {lat:34.894440, lng:136.057040},
            front:  {lat:34.892230, lng:136.059981},
            center: {lat:34.892151, lng:136.060141},
            back:   {lat:34.892084, lng:136.060289},
          },
          // H5〜H9は座標登録待ち
          { no:5, par:4,  tee:null, front:null, center:null, back:null },
          { no:6, par:4,  tee:null, front:null, center:null, back:null },
          { no:7, par:5,  tee:null, front:null, center:null, back:null },
          { no:8, par:3,  tee:null, front:null, center:null, back:null },
          { no:9, par:4,  tee:null, front:null, center:null, back:null },
        ]
      },
      {
        name: 'イン', cid: 1313,
        holes: [
          { no:1, par:4, tee:null, front:null, center:null, back:null },
          { no:2, par:4, tee:null, front:null, center:null, back:null },
          { no:3, par:4, tee:null, front:null, center:null, back:null },
          { no:4, par:4, tee:null, front:null, center:null, back:null },
          { no:5, par:4, tee:null, front:null, center:null, back:null },
          { no:6, par:4, tee:null, front:null, center:null, back:null },
          { no:7, par:4, tee:null, front:null, center:null, back:null },
          { no:8, par:4, tee:null, front:null, center:null, back:null },
          { no:9, par:4, tee:null, front:null, center:null, back:null },
        ]
      },
    ]
  },
];

// ============================================================
// 状態
// ============================================================
const API_KEY = 'AIzaSyCWJ1tClOaETblGP4m0ndFbpPt4JyKN1pg';
let map = null, mapsLoaded = false;
let state = { gcIdx:null, cIdx:null, holeIdx:0 };
let pinMarkers = [];
let clickMarker = null, distanceLine = null;
let gpsMarker = null, gpsWatch = null, gpsActive = false;

const gc     = () => state.gcIdx !== null ? COURSES[state.gcIdx] : null;
const course = () => gc() && state.cIdx !== null ? gc().courses[state.cIdx] : null;
const hole   = () => course() ? course().holes[state.holeIdx] : null;
const hasData= (h) => h && h.tee && h.front;

// ============================================================
// セレクタ
// ============================================================
function initSelects() {
  const s = document.getElementById('gcSel');
  COURSES.forEach((c,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=`${c.name}（${c.pref}）`; s.appendChild(o);
  });
}

function onGCSel() {
  const v = document.getElementById('gcSel').value;
  state.gcIdx = v==='' ? null : parseInt(v);
  state.cIdx  = null; state.holeIdx = 0;
  const cs = document.getElementById('courseSel');
  cs.innerHTML = '<option value="">-- コース --</option>';
  if (gc()) {
    gc().courses.forEach((c,i)=>{
      const o=document.createElement('option');
      o.value=i; o.textContent=c.name; cs.appendChild(o);
    });
    if (gc().courses.length===1){ cs.value=0; onCourseSel(); }
  }
  updateSNLink();
}

function onCourseSel() {
  const v = document.getElementById('courseSel').value;
  state.cIdx = v==='' ? null : parseInt(v);
  state.holeIdx = 0;
  renderHoleStrip();
  loadHole();
  updateSNLink();
}

// ============================================================
// ホールストリップ
// ============================================================
function renderHoleStrip() {
  const strip = document.getElementById('holeStrip');
  if (!course()) { strip.innerHTML=''; return; }
  strip.innerHTML = course().holes.map((h,i)=>`
    <button class="h-btn ${i===state.holeIdx?'active':''} ${!hasData(h)?'no-data':''}"
      onclick="selectHole(${i})"
      title="${!hasData(h)?'座標未登録':''}">
      ${h.no}H<span class="par">PAR${h.par}</span>
    </button>
  `).join('');
}

function selectHole(i) {
  state.holeIdx = i;
  renderHoleStrip();
  loadHole();
  updateSNLink();
}

// ============================================================
// 地図ロード
// ============================================================
function loadHole() {
  const h = hole();

  if (!h || !hasData(h)) {
    // 座標未登録
    document.getElementById('map').style.display = 'none';
    document.getElementById('emptyMap').style.display = 'flex';
    document.getElementById('emptyMap').querySelector('p').textContent =
      h ? `${h.no}番ホールの座標はまだ登録されていません` : 'コースを選択してください';
    document.getElementById('legend').style.display = 'none';
    document.getElementById('modeInfo').innerHTML = h
      ? `<strong>H${h.no}</strong> 座標未登録`
      : 'コースを選択してください';
    clearMeasure();
    return;
  }

  document.getElementById('emptyMap').style.display = 'none';
  document.getElementById('map').style.display = 'block';
  document.getElementById('legend').style.display = 'block';
  document.getElementById('modeInfo').innerHTML =
    `<strong>${gc().name} ${course().name} ${h.no}H PAR${h.par}</strong>　タップで距離測定`;

  clearMeasure();
  if (!mapsLoaded) return;

  const center = { lat: h.tee.lat, lng: h.tee.lng };

  if (!map) {
    map = new google.maps.Map(document.getElementById('map'), {
      center, zoom: 17,
      mapTypeId: 'satellite', tilt: 0,
      disableDefaultUI: true,
      zoomControl: true,
      gestureHandling: 'greedy',
      zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER }
    });
    map.addListener('click', onMapClick);
  } else {
    // ティーとグリーンが両方見えるようにboundsをfit
    const bounds = new google.maps.LatLngBounds();
    bounds.extend(h.tee);
    bounds.extend(h.front);
    bounds.extend(h.back);
    map.fitBounds(bounds, { top:60, bottom:80, left:40, right:40 });
  }

  placePins(h);
}

// ============================================================
// ピン配置（ティー＋3ピン）
// ============================================================
function placePins(h) {
  pinMarkers.forEach(m => m.setMap(null));
  pinMarkers = [];

  const mkr = (pos, color, labelText, title) => {
    const m = new google.maps.Marker({
      position: pos, map, title,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 11,
        fillColor: color, fillOpacity: 1,
        strokeColor: '#fff', strokeWeight: 2,
      },
      label: { text: labelText, color: '#fff', fontSize: '11px', fontWeight: 'bold' }
    });
    // クリックで打点→このピンへの距離
    m.addListener('click', () => {
      if (clickMarker) showDist(clickMarker.getPosition(), m.getPosition(), title);
    });
    return m;
  };

  // ティー（青・T）
  pinMarkers.push(mkr(h.tee,    '#4a9fd4', 'T', 'ティー'));
  // フロント（赤・F）
  pinMarkers.push(mkr(h.front,  '#e05252', 'F', 'フロント'));
  // センター（紫・C）
  pinMarkers.push(mkr(h.center, '#a78bfa', 'C', 'センター'));
  // バック（黄・B）
  pinMarkers.push(mkr(h.back,   '#e8c84a', 'B', 'バック'));
}

// ============================================================
// 地図クリック → 打点マーカー → 最近ピンへ自動計算
// ============================================================
function onMapClick(e) {
  const pos = e.latLng;
  if (clickMarker) clickMarker.setMap(null);
  if (distanceLine) distanceLine.setMap(null);

  clickMarker = new google.maps.Marker({
    position: pos, map,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 8,
      fillColor: '#fff', fillOpacity: 0.9,
      strokeColor: '#4a9fd4', strokeWeight: 2.5,
    },
    zIndex: 99
  });

  // 最も近いピン（F/C/B）への距離を自動表示
  const h = hole();
  if (!h || !hasData(h)) return;
  const targets = [
    { pos: h.front,  name: 'フロント', cls: 'front' },
    { pos: h.center, name: 'センター', cls: 'center' },
    { pos: h.back,   name: 'バック',   cls: 'back'  },
  ];
  let nearest = targets[0];
  let minD = haversine(pos.lat(), pos.lng(), nearest.pos.lat, nearest.pos.lng);
  targets.slice(1).forEach(t => {
    const d = haversine(pos.lat(), pos.lng(), t.pos.lat, t.pos.lng);
    if (d < minD) { minD = d; nearest = t; }
  });
  showDist(pos, new google.maps.LatLng(nearest.pos.lat, nearest.pos.lng), nearest.name, nearest.cls);
}

// ============================================================
// 距離表示
// ============================================================
function showDist(from, to, label, cls='') {
  const m  = haversine(from.lat(), from.lng(), to.lat(), to.lng());
  const yd = Math.round(m * 1.09361);

  document.getElementById('yardVal').innerHTML = `${yd}<span>yd</span>`;
  document.getElementById('meterVal').textContent = `${Math.round(m)} m`;
  const tEl = document.getElementById('targetLabel');
  tEl.textContent = `→ ${label}`;
  tEl.className = `target ${cls}`;
  document.getElementById('distPanel').classList.add('show');

  if (distanceLine) distanceLine.setMap(null);
  distanceLine = new google.maps.Polyline({
    path: [from, to], map,
    strokeColor: '#e8c84a', strokeOpacity: 0.85, strokeWeight: 2,
    icons: [{ icon:{ path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale:3 }, offset:'100%' }]
  });
}

// ============================================================
// Haversine
// ============================================================
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, r=Math.PI/180;
  const dL=(lat2-lat1)*r, dN=(lng2-lng1)*r;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ============================================================
// リセット
// ============================================================
function clearMeasure() {
  if (clickMarker)  { clickMarker.setMap(null);  clickMarker=null; }
  if (distanceLine) { distanceLine.setMap(null); distanceLine=null; }
  document.getElementById('distPanel').classList.remove('show');
}

// ============================================================
// GPS
// ============================================================
function toggleGPS() {
  gpsActive ? stopGPS() : startGPS();
}
function startGPS() {
  if (!navigator.geolocation){ alert('GPSに非対応です'); return; }
  gpsActive = true;
  document.getElementById('gpsBtn').classList.add('active');
  gpsWatch = navigator.geolocation.watchPosition(pos => {
    const ll = { lat:pos.coords.latitude, lng:pos.coords.longitude };
    if (!gpsMarker) {
      gpsMarker = new google.maps.Marker({
        position:ll, map, title:'現在地',
        icon:{ path:google.maps.SymbolPath.CIRCLE, scale:9,
          fillColor:'#4a9fd4', fillOpacity:.9, strokeColor:'#fff', strokeWeight:2.5 }
      });
    } else { gpsMarker.setPosition(ll); }
    if (map) map.panTo(ll);
  }, err => { alert('現在地取得失敗: '+err.message); stopGPS(); },
  { enableHighAccuracy:true, maximumAge:3000 });
}
function stopGPS() {
  gpsActive=false;
  document.getElementById('gpsBtn').classList.remove('active');
  if (gpsWatch){ navigator.geolocation.clearWatch(gpsWatch); gpsWatch=null; }
  if (gpsMarker){ gpsMarker.setMap(null); gpsMarker=null; }
}

// ============================================================
// ShotNaviリンク
// ============================================================
function updateSNLink() {
  const h=hole(), g=gc(), c=course();
  const link=document.getElementById('snLink');
  link.href = (h&&g&&c) ? `https://shotnavi.jp/gcguide/cdata/hdata2_${g.gcid}_${c.cid}_${h.no}.htm` : '#';
}

// ============================================================
// Maps API コールバック
// ============================================================
window.initMap = function() {
  mapsLoaded = true;
  loadHole();
};

initSelects();
updateSNLink();
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCWJ1tClOaETblGP4m0ndFbpPt4JyKN1pg&callback=initMap&language=ja">
</script>
</body>
</html>
